# Dev-environment overrides on top of values.yaml.
#
# TEMPLATE: copy this file and edit the placeholder hostnames + issuer URL
# for your own dev cluster. The values below are intentionally generic.
#
# Single-replica everything, smaller resource requests, ingress assumes a
# real DNS record you control. Auth is ON in dev so you exercise the real
# OIDC path; flip enabled=false to bypass.

image:
  hapi:
    pullPolicy: Always
  interfaceEngine:
    pullPolicy: Always

postgres:
  storage:
    size: 20Gi

ingress:
  enabled: true
  className: traefik
  hosts:
    - host: <your-dev-host>.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - <your-dev-host>.example.com
      secretName: subscription-service-dev-tls

featureToggles:
  auth:
    enabled: true
    issuer: https://<your-keycloak-host>.example.com/realms/subscription-service
  validation:
    mode: warn
  channelSecurity:
    mode: strict
  multitenancy:
    mode: disabled

networkPolicy:
  enabled: false

# PDBs ON in dev/prod clusters: real k8s ships a PDB controller and we want
# voluntary-eviction protection during node drains / cluster upgrades.
podDisruptionBudgets:
  enabled: true
