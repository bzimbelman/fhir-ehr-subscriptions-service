# Default values for subscription-service.
#
# Sensible defaults for development clusters. Production deployments should
# layer values-prod.yaml on top, and Rancher Desktop validation uses
# values-rancher.yaml. See deploy/k8s/charts/subscription-service/README.md.

# ---------------------------------------------------------------------------
# Common labels / pod metadata. nameOverride lets two releases live in the
# same namespace if ever needed.
# ---------------------------------------------------------------------------
nameOverride: ""
fullnameOverride: ""

# ---------------------------------------------------------------------------
# Container images. Defaults match the local Compose build (the HAPI and
# interface-engine images are built locally from this repo; see
# deploy/k8s/charts/.../README.md for the Rancher Desktop image-loading
# workflow). For real clusters, push the images to a registry and override
# .repository/.tag here.
# ---------------------------------------------------------------------------
image:
  hapi:
    repository: subscription-service/hapi
    tag: dev
    pullPolicy: IfNotPresent
  matchbox:
    repository: europe-west6-docker.pkg.dev/ahdis-ch/ahdis/matchbox
    tag: v3.9.13
    pullPolicy: IfNotPresent
  interfaceEngine:
    repository: subscription-service/interface-engine
    tag: dev
    pullPolicy: IfNotPresent
  postgres:
    repository: postgres
    tag: 16-alpine
    pullPolicy: IfNotPresent
  # Init container that pulls IG tarballs from packages.fhir.org. Needs curl.
  # alpine + curl by default; override to an internal mirror for air-gapped.
  igFetcher:
    repository: curlimages/curl
    tag: "8.10.1"
    pullPolicy: IfNotPresent

imagePullSecrets: []

# ---------------------------------------------------------------------------
# Postgres (HAPI's datastore). StatefulSet + PVC.
#
# Ignored when `externalPostgres.enabled: true` (ticket #416) — the chart
# then skips the StatefulSet/Service/Secret and HAPI connects to the
# managed Postgres described in the externalPostgres block below.
# ---------------------------------------------------------------------------
postgres:
  user: hapi
  # When empty, the chart generates a random 32-char password on first
  # install and stores it in the postgres Secret. On `helm upgrade` the
  # generated password is preserved (read back from the existing Secret).
  # To set it explicitly, supply a value here or use an existing Secret —
  # see externalPostgres.passwordSecret below.
  password: ""
  database: hapi
  storage:
    size: 10Gi
    storageClassName: ""   # "" -> cluster default StorageClass.
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi
  service:
    port: 5432
  # `postgres:16-alpine` runs as UID 70 (the alpine `postgres` user).
  # fsGroup: 70 makes the PVC mount writable by the entrypoint's chown of
  # PGDATA. Override here (not at chart level) so other workloads stay on
  # their own UIDs.
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 70
    runAsGroup: 70
    fsGroup: 70
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop: ["ALL"]
    runAsNonRoot: true
    runAsUser: 70

# ---------------------------------------------------------------------------
# External Postgres (RDS, Cloud SQL, Azure DB for PostgreSQL, on-prem, etc.)
#
# When `enabled: true`, the chart SKIPS the in-cluster StatefulSet, Service,
# PVC, and Secret. HAPI is configured to connect to the host below, pulling
# the password from `passwordSecret` (which must exist before `helm install`).
#
# Schema note: HAPI auto-creates its tables on first connect. The DB user
# must therefore have CREATE privileges on the target database. On managed
# DBs that means: create the database, create a role, grant ALL on the new
# database to that role, and use it here. RDS / Cloud SQL operator UIs all
# expose this.
# ---------------------------------------------------------------------------
externalPostgres:
  enabled: false
  host: ""                       # e.g. subsvc-prod.abc123.us-east-1.rds.amazonaws.com
  port: 5432
  database: hapi
  user: hapi
  # Name of an EXISTING Secret in this release's namespace holding the
  # Postgres password under the key `password`. Create it before install:
  #
  #   kubectl create secret generic my-postgres-pw \
  #     --from-literal=password='<the-password>' \
  #     --namespace=<release-namespace>
  #
  # Then set passwordSecret: my-postgres-pw here.
  passwordSecret: ""
  # SSL mode for HAPI's JDBC connection. Most managed Postgres services
  # require TLS; pick the strictest level your cluster's CA bundle supports.
  #   disable     | no TLS — only OK for local dev
  #   require     | TLS, no cert verification (default; widely compatible)
  #   verify-ca   | TLS + verify server cert against system CA bundle
  #   verify-full | TLS + verify hostname matches cert SAN
  sslMode: require

# ---------------------------------------------------------------------------
# Interface-engine's own Postgres database (Epic #378). Lives on the same
# Postgres server as HAPI but is a separate database + user. The init
# script in templates/configmap-postgres-init.yaml creates the role + DB
# on the Postgres StatefulSet's first boot. The password lives in a
# separate Secret (templates/secret-ipf-db.yaml) with the same
# auto-generate-and-preserve semantics as the HAPI postgres Secret.
#
# Skipped when externalPostgres.enabled. If you want a managed Postgres
# for the interface engine too, override IPF_DB_* env vars on the
# interface-engine Deployment directly.
# ---------------------------------------------------------------------------
interfaceEngineDb:
  user: ipf
  database: ipf
  # When empty, the chart generates a random 32-char password on first
  # install and stores it in the <release>-ipf-db Secret. Preserved across
  # `helm upgrade`. Override here only for explicit test/dev passwords.
  password: ""

# ---------------------------------------------------------------------------
# HAPI FHIR server.
# ---------------------------------------------------------------------------
hapi:
  replicaCount: 1
  # Spring profiles to activate. Default is empty (compact JSON logs). Set to
  # `dev` for pretty-printed JSON in non-prod clusters — see
  # docs/observability/log-schema.md.
  profiles: ""
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      cpu: 250m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 3Gi
  # IG packages to fetch into an emptyDir at /app/igs via initContainer.
  # The container runs `curl <packageUrl>` and writes <name>-<version>.tgz.
  igs:
    - name: hl7.fhir.us.core
      version: "7.0.0"
    - name: hl7.fhir.uv.subscriptions-backport.r4
      version: "1.1.0"
  igRegistry: https://packages.fhir.org
  # If your cluster sits behind a TLS-inspecting proxy (corporate MITM,
  # Rancher Desktop on a Netskope-managed Mac, etc.), set
  # `igFetcher.insecure: true` to skip TLS verification in the init
  # container. ONLY affects the IG fetch step; runtime HAPI traffic is
  # unaffected. Off by default; turn on in values-rancher.yaml or via
  # --set if needed.
  igFetcherInsecure: false
  # Java JEP-330 single-file healthcheck (same probe as Compose). Mounted via
  # ConfigMap. Distroless image has no shell/curl/wget, only the JRE.
  healthcheck:
    initialDelaySeconds: 60
    periodSeconds: 10
    timeoutSeconds: 10
    failureThreshold: 30
  # `hapiproject/hapi:v7.6.0` is a distroless image running as `nonroot`
  # (UID 65532). fsGroup matches so the emptyDir for IGs is readable.
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
    fsGroup: 65532
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop: ["ALL"]
    runAsNonRoot: true
    runAsUser: 65532

# ---------------------------------------------------------------------------
# Matchbox (StructureMap engine).
# ---------------------------------------------------------------------------
matchbox:
  replicaCount: 1
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 2Gi
  # Same init-container pattern as HAPI: pull the v2-to-FHIR IG into an
  # emptyDir mounted at /app/matchbox/igs.
  igs:
    - name: hl7.fhir.uv.v2mappings
      version: "1.0.0"
  igRegistry: https://packages.fhir.org
  igFetcherInsecure: false
  # `ahdis/matchbox:v3.9.13` runs as USER `matchbox` (UID 1000).
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop: ["ALL"]
    runAsNonRoot: true
    runAsUser: 1000

# ---------------------------------------------------------------------------
# Interface engine — Spring Boot + IPF (HL7 MLLP listener + Camel router).
# ---------------------------------------------------------------------------
interfaceEngine:
  replicaCount: 1
  # Spring profiles. Default empty (compact JSON logs). `dev` enables
  # pretty-printed JSON — see docs/observability/log-schema.md.
  profiles: ""
  http:
    service:
      type: ClusterIP
      port: 8090
  # ---------------------------------------------------------------------------
  # Admin REST API (Epic #378, ticket #384). Bearer token gates `/admin/**`.
  # When empty (the default), endpoints are UNAUTHENTICATED — fine for ephemeral
  # dev clusters, NOT FINE for any cluster reachable from outside its namespace.
  # Production deployments must override this to a long random string and
  # rotate it periodically. The chart wires this value into the
  # IPF_ADMIN_AUTH_TOKEN env var on the interface-engine Deployment.
  # ---------------------------------------------------------------------------
  admin:
    authToken: ""
  # ---------------------------------------------------------------------------
  # Async worker (Epic #378, ticket #382). Polls `ingested_messages` for
  # RECEIVED + retry-ready FAILED rows; transforms via matchbox; POSTs the
  # resulting Bundle to HAPI. See interface-engine/.../worker/IngestedMessageWorker.kt
  # for the full design. These chart values become the IPF_WORKER_* env vars
  # on the interface-engine container.
  #
  # `enabled: false` disables the bean entirely (via @ConditionalOnProperty),
  # which is useful for an "ingest-only" replica that ACKs MLLP traffic but
  # leaves the queue work for a sibling pod. Defaults are sized for the
  # single-replica v1 deployment described in docs/architecture.md.
  # ---------------------------------------------------------------------------
  worker:
    enabled: true
    pollIntervalMs: 1000
    batchSize: 10
    transformingStaleSeconds: 60
    # ---------------------------------------------------------------------
    # Retry policy (Epic #378, ticket #383). When a row fails (matchbox
    # transform or HAPI POST raised), the worker schedules a retry with
    # exponential backoff. After `maxAttempts` failures the row moves to
    # DEAD_LETTER and stops being polled — the admin retry endpoint (#384)
    # is the only way out.
    #
    # Defaults produce 1s, 2s, 4s, 8s, 16s (capped at 5 min); the 5th
    # failure DLQs. Total wall-clock spent waiting between retries: ~31s.
    # Values map 1:1 to IPF_* env vars on the interface-engine container.
    # ---------------------------------------------------------------------
    retry:
      maxAttempts: 5
      backoffBaseMs: 1000
      backoffMaxMs: 300000
      backoffFactor: 2.0
      dlqLogLevel: WARN
  # MLLP exposed as a separate LoadBalancer Service so cluster ingress
  # controllers (which speak HTTP) don't have to handle plain TCP. On Rancher
  # Desktop, traefik/klipper-lb exposes the LoadBalancer on localhost.
  mllp:
    service:
      type: LoadBalancer
      port: 2575
      # Set this to a specific external IP on cloud LBs. Rancher Desktop
      # ignores it.
      loadBalancerIP: ""
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  # interface-engine/Dockerfile pins USER `app` (UID 10001).
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 10001
    runAsGroup: 10001
    fsGroup: 10001
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop: ["ALL"]
    runAsNonRoot: true
    runAsUser: 10001

# ---------------------------------------------------------------------------
# Feature toggles. These map 1:1 to the env vars HAPI reads. See
# docs/architecture.md for the meaning of each mode.
# ---------------------------------------------------------------------------
featureToggles:
  auth:
    enabled: false       # default OFF so the chart works without a Keycloak.
    issuer: ""           # e.g. https://keycloak.example.com/realms/subsvc
    jwksUrl: ""          # blank -> issuer + /protocol/openid-connect/certs
  validation:
    mode: "off"          # off | warn | enforce
  channelSecurity:
    mode: strict         # strict | relaxed | permissive
  multitenancy:
    mode: disabled       # disabled | enabled
    tenantClaim: tenant
    testMode: false      # NEVER true outside the e2e isolation suite.
  # FHIR AuditEvent generator (ticket #391, Epic #387). Every interesting REST
  # operation produces an AuditEvent resource persisted back into HAPI so the
  # audit trail is queryable via `GET /fhir/AuditEvent`. `enabled` defaults to
  # `true` (production paranoia). `captureReads` / `captureSearch` are off by
  # default — read traffic dwarfs write traffic; turn them on per deployment if
  # compliance requires it.
  audit:
    enabled: true
    captureReads: false
    captureSearch: false
    retentionDays: 365   # Informational only — purging is a separate job.

# ---------------------------------------------------------------------------
# FHIR HTTPS ingress. Disabled by default; enable per environment.
# ---------------------------------------------------------------------------
ingress:
  enabled: true
  className: traefik
  annotations: {}
  hosts:
    - host: subscription-service.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #   - hosts:
  #       - subscription-service.example.com
  #     secretName: subscription-service-tls
  # cert-manager integration. Off by default — when enabled, the chart
  # adds the appropriate cert-manager annotation to the Ingress and
  # auto-populates ingress.tls if the operator didn't supply one.
  #
  # REQUIRES cert-manager to already be installed in the cluster with a
  # ClusterIssuer (or Issuer) configured for the chosen ACME / DNS
  # provider. The chart does NOT install cert-manager itself.
  certManager:
    enabled: false
    # ONE of clusterIssuer or issuer must be set when enabled is true.
    # clusterIssuer is the typical choice; issuer is namespace-scoped.
    clusterIssuer: ""              # e.g. "letsencrypt-prod"
    issuer: ""                     # e.g. "my-namespace-issuer"

# ---------------------------------------------------------------------------
# NetworkPolicy. OPTIONAL; off by default because k3s/Rancher Desktop ships
# without a NetworkPolicy controller. Turn on in production clusters.
# ---------------------------------------------------------------------------
networkPolicy:
  enabled: false

# ---------------------------------------------------------------------------
# PodDisruptionBudgets. Off by default. Turn on in production clusters to
# protect against voluntary evictions (node drain, k8s upgrade, scale-down).
# Doesn't block forced drains. Most useful when paired with replica > 1; on
# single-replica deployments, a PDB with minAvailable: 1 blocks ALL voluntary
# evictions of that pod — pair carefully with cluster admin's maintenance
# expectations.
# ---------------------------------------------------------------------------
podDisruptionBudgets:
  enabled: false
  hapi:
    minAvailable: 1
  matchbox:
    minAvailable: 1
  interfaceEngine:
    minAvailable: 1
  # postgres is a StatefulSet with a single replica; maxUnavailable: 0 means
  # 'don't voluntarily evict this pod at all'.
  postgres:
    maxUnavailable: 0

# ---------------------------------------------------------------------------
# Monitoring. Opt-in. Produces a ServiceMonitor resource for the Prometheus
# Operator to discover and scrape /actuator/prometheus on interface-engine
# (and HAPI when it gets its own metrics endpoint via #389).
#
# Requires the Prometheus Operator's `monitoring.coreos.com/v1` CRDs to be
# installed in the cluster. The chart checks `.Capabilities.APIVersions.Has`
# at template time, so if the CRDs aren't present this block is a no-op
# (the chart still installs cleanly on clusters without the Operator).
#
# NOTE: the /actuator/prometheus endpoint itself isn't wired up yet —
# tracked in Epic #387 #389. Until that ships, this block is no-op even
# when enabled. The chart plumbing is in place so flipping enabled=true
# AFTER #389 lands needs zero chart changes.
# ---------------------------------------------------------------------------
monitoring:
  enabled: false
  serviceMonitor:
    interval: 30s
    scrapeTimeout: 10s
    # Extra labels added to ServiceMonitor metadata so the operator's
    # selector (typically prometheus.spec.serviceMonitorSelector) can match.
    # Real clusters require something here; common default is "release: prometheus".
    labels: {}
    # Path that exposes Prometheus metrics on each service's HTTP port.
    path: /actuator/prometheus

# ---------------------------------------------------------------------------
# OpenTelemetry distributed tracing (Epic #387, ticket #394).
#
# Default OFF — span recording is a no-op when `enabled: false`, with no
# SDK threads, no exporter, no network connections. Flip on when you have
# an OTLP collector reachable from the pods. Service-name is set
# automatically per workload (`subscription-service-interface-engine`,
# `subscription-service-hapi`) — operators don't have to override unless
# they want a different naming convention.
#
# `endpoint`: OTLP gRPC endpoint (defaults to the standard 4317 port).
# `resourceAttributes`: optional `key=value,key2=value2` string appended
#   to OTEL_RESOURCE_ATTRIBUTES — handy for `deployment.environment=prod`.
# ---------------------------------------------------------------------------
otel:
  enabled: false
  endpoint: ""
  resourceAttributes: ""

# ---------------------------------------------------------------------------
# Common pod scheduling knobs (apply to all four deployments).
# ---------------------------------------------------------------------------
nodeSelector: {}
tolerations: []
affinity: {}
podAnnotations: {}

# ---------------------------------------------------------------------------
# Security contexts (Pod Security Standards `restricted`-compatible).
#
# Defaults below satisfy the `restricted` PSA profile (the strictest of the
# three: privileged | baseline | restricted) so the chart installs cleanly on
# namespaces labeled `pod-security.kubernetes.io/enforce=restricted`. GKE
# Autopilot, OpenShift, and many hardened production clusters enforce this
# profile by default. See:
#   https://kubernetes.io/docs/concepts/security/pod-security-standards/
#
# Chart-level `podSecurityContext` / `securityContext` are the BASE: every
# Deployment / StatefulSet starts from these. Per-workload overrides (e.g.
# `hapi.podSecurityContext`) deep-merge on top so each workload can use the
# UID its image actually expects.
#
# Why the per-workload overrides exist:
#   - HAPI's upstream `hapiproject/hapi:v7.6.0` is distroless with USER 65532
#   - Matchbox's `ahdis/matchbox:v3.9.13` runs as USER 1000 (`matchbox`)
#   - Postgres's `postgres:16-alpine` runs as USER 70 (`postgres`)
#   - Interface engine builds USER 10001 (`app`) in interface-engine/Dockerfile
#   - The IG-fetcher initContainer (`curlimages/curl`) runs as 100:101
#
# To LOOSEN for debugging (e.g. exec a shell as root), override on the CLI:
#   helm upgrade ... --set podSecurityContext.runAsNonRoot=false \
#                    --set securityContext.allowPrivilegeEscalation=true
# Don't do that in production. The default is correct.
# ---------------------------------------------------------------------------
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  # readOnlyRootFilesystem stays false because HAPI / IPF / Matchbox all write
  # to /tmp (JVM scratch, Tomcat work dirs). To turn it on, mount tmpfs/emptyDir
  # at /tmp and any other writable paths the JVMs need.
  readOnlyRootFilesystem: false
  capabilities:
    drop: ["ALL"]
  runAsNonRoot: true
  runAsUser: 1000
