{{- /*
HAPI FHIR JPA server. Mirrors the `hapi` service in
deploy/docker/docker-compose.yml — same image, same env vars, same mounted
files. Key k8s-specific bits:

  - IG tarballs are NOT in ConfigMaps (US Core 7.0 is ~1.6 MB, ConfigMap
    limit is 1 MiB). An initContainer downloads them from packages.fhir.org
    into an emptyDir mounted at /app/igs. The init container needs internet
    egress; document this in the chart README.
  - The Java healthcheck file is small (a few hundred bytes) and goes in a
    ConfigMap mounted at /app/healthcheck.
  - application.yaml is in its own ConfigMap, mounted to /app/config.
  - SPRING_DATASOURCE_* env vars point at the postgres service by DNS.
*/ -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "subscription-service.hapi.fullname" . }}
  labels:
    {{- include "subscription-service.labels" . | nindent 4 }}
    app.kubernetes.io/component: hapi
spec:
  replicas: {{ .Values.hapi.replicaCount }}
  selector:
    matchLabels:
      {{- include "subscription-service.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: hapi
  template:
    metadata:
      labels:
        {{- include "subscription-service.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: hapi
      annotations:
        # Pod restart trigger on config change (helm upgrade picks this up).
        checksum/config: {{ include (print $.Template.BasePath "/configmap-hapi.yaml") . | sha256sum }}
        checksum/healthcheck: {{ include (print $.Template.BasePath "/configmap-healthcheck.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- include "subscription-service.podSecurityContext" (dict "ctx" . "workload" "hapi") | nindent 8 }}
      initContainers:
        - name: fetch-igs
          image: "{{ .Values.image.igFetcher.repository }}:{{ .Values.image.igFetcher.tag }}"
          imagePullPolicy: {{ .Values.image.igFetcher.pullPolicy }}
          # curl image runs as non-root with /tmp writable; emptyDir mounted
          # at /igs is writable via the pod's fsGroup (curl_user is added to
          # the supplementary group by the kubelet).
          securityContext:
            {{- include "subscription-service.igFetcherSecurityContext" . | nindent 12 }}
          command:
            - sh
            - -c
            - |
              set -eu
              REG="{{ .Values.hapi.igRegistry }}"
              INSECURE=""
              {{- if .Values.hapi.igFetcherInsecure }}
              # TLS verification disabled for the IG fetch — corporate MITM
              # / Rancher Desktop on a managed Mac. Runtime HAPI traffic is
              # unaffected.
              INSECURE="--insecure"
              {{- end }}
              {{- range .Values.hapi.igs }}
              echo "Fetching {{ .name }}@{{ .version }}"
              curl --fail --location --silent --show-error $INSECURE \
                -o "/igs/{{ .name }}-{{ .version }}.tgz" \
                "$REG/{{ .name }}/{{ .version }}"
              {{- end }}
              echo "All IGs fetched:"
              ls -la /igs
          volumeMounts:
            - name: igs
              mountPath: /igs
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
      containers:
        - name: hapi
          image: "{{ .Values.image.hapi.repository }}:{{ .Values.image.hapi.tag }}"
          imagePullPolicy: {{ .Values.image.hapi.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            {{- if .Values.externalPostgres.enabled }}
            # External managed Postgres (ticket #416). The Secret named in
            # externalPostgres.passwordSecret must already exist in this
            # namespace with the password under the key "password".
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://{{ .Values.externalPostgres.host }}:{{ .Values.externalPostgres.port }}/{{ .Values.externalPostgres.database }}?sslmode={{ .Values.externalPostgres.sslMode }}
            - name: SPRING_DATASOURCE_USERNAME
              value: {{ .Values.externalPostgres.user | quote }}
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalPostgres.passwordSecret }}
                  key: password
            {{- else }}
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://{{ include "subscription-service.postgres.fullname" . }}:{{ .Values.postgres.service.port }}/{{ .Values.postgres.database }}?sslmode=disable
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "subscription-service.postgres.fullname" . }}
                  key: POSTGRES_USER
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "subscription-service.postgres.fullname" . }}
                  key: POSTGRES_PASSWORD
            {{- end }}
            - name: SPRING_DATASOURCE_DRIVER_CLASS_NAME
              value: org.postgresql.Driver
            - name: SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT
              value: ca.uhn.fhir.jpa.model.dialect.HapiFhirPostgresDialect
            - name: SUBSCRIPTION_SERVICE_VALIDATION_MODE
              value: {{ .Values.featureToggles.validation.mode | quote }}
            - name: SUBSCRIPTION_SERVICE_CHANNEL_SECURITY
              value: {{ .Values.featureToggles.channelSecurity.mode | quote }}
            - name: SUBSCRIPTION_SERVICE_MULTITENANCY
              value: {{ .Values.featureToggles.multitenancy.mode | quote }}
            - name: SUBSCRIPTION_SERVICE_MULTITENANCY_TENANT_CLAIM
              value: {{ .Values.featureToggles.multitenancy.tenantClaim | quote }}
            - name: SUBSCRIPTION_SERVICE_MULTITENANCY_TEST_MODE
              value: {{ .Values.featureToggles.multitenancy.testMode | quote }}
            # FHIR AuditEvent generator (ticket #391). See application.yaml /
            # values.yaml for the full meaning of each knob.
            - name: SUBSCRIPTION_SERVICE_AUDIT_ENABLED
              value: {{ .Values.featureToggles.audit.enabled | quote }}
            - name: SUBSCRIPTION_SERVICE_AUDIT_CAPTURE_READS
              value: {{ .Values.featureToggles.audit.captureReads | quote }}
            - name: SUBSCRIPTION_SERVICE_AUDIT_CAPTURE_SEARCH
              value: {{ .Values.featureToggles.audit.captureSearch | quote }}
            - name: SUBSCRIPTION_SERVICE_AUDIT_RETENTION_DAYS
              value: {{ .Values.featureToggles.audit.retentionDays | quote }}
            # JSON log layout (Epic #387, ticket #388). Tells Spring Boot to
            # load the logback config bundled inside the
            # subscription-service-hapi-auth JAR (which is on the classpath
            # via /app/extra-classes/) rather than the upstream HAPI image's
            # default config. The file is uniquely named
            # `logback-spring-subsvc.xml` so it can't clash with the
            # upstream's logback.xml — see hapi/auth/.../logback-spring-subsvc.xml.
            - name: LOGGING_CONFIG
              value: "classpath:logback-spring-subsvc.xml"
            # Pretty-print profile for human-readable JSON when running on
            # a dev cluster. Set spring.profiles.active=dev via this env
            # var when desired; default is the compact one-line-per-record
            # production layout.
            - name: SPRING_PROFILES_ACTIVE
              value: {{ .Values.hapi.profiles | default "" | quote }}
          envFrom:
            - secretRef:
                name: {{ include "subscription-service.hapi.fullname" . }}-auth
          volumeMounts:
            - name: config
              mountPath: /app/config
              readOnly: true
            - name: igs
              mountPath: /app/igs
              readOnly: true
            - name: healthcheck
              mountPath: /app/healthcheck
              readOnly: true
          readinessProbe:
            # Probe HAPI's CapabilityStatement via the JEP-330 helper. Java
            # is the only binary present in the distroless image.
            exec:
              command:
                - java
                - /app/healthcheck/HapiHealthCheck.java
            initialDelaySeconds: {{ .Values.hapi.healthcheck.initialDelaySeconds }}
            periodSeconds: {{ .Values.hapi.healthcheck.periodSeconds }}
            timeoutSeconds: {{ .Values.hapi.healthcheck.timeoutSeconds }}
            failureThreshold: {{ .Values.hapi.healthcheck.failureThreshold }}
          livenessProbe:
            exec:
              command:
                - java
                - /app/healthcheck/HapiHealthCheck.java
            initialDelaySeconds: 180
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          resources:
            {{- toYaml .Values.hapi.resources | nindent 12 }}
          securityContext:
            {{- include "subscription-service.securityContext" (dict "ctx" . "workload" "hapi") | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "subscription-service.hapi.fullname" . }}-config
        - name: healthcheck
          configMap:
            name: {{ include "subscription-service.hapi.fullname" . }}-healthcheck
        - name: igs
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
