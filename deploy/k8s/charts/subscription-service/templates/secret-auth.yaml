{{- /*
Optional auth config. Always created so the HAPI deployment can reference
it unconditionally; values are empty strings when auth is disabled.
*/ -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "subscription-service.hapi.fullname" . }}-auth
  labels:
    {{- include "subscription-service.labels" . | nindent 4 }}
    app.kubernetes.io/component: hapi
type: Opaque
stringData:
  SUBSCRIPTION_SERVICE_AUTH_ENABLED: {{ .Values.featureToggles.auth.enabled | quote }}
  SUBSCRIPTION_SERVICE_AUTH_ISSUER: {{ .Values.featureToggles.auth.issuer | quote }}
  SUBSCRIPTION_SERVICE_AUTH_JWKS_URL: {{ include "subscription-service.auth.jwksUrl" . | quote }}
