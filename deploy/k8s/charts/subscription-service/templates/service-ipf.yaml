{{- /*
Two Services for IPF:
  - <release>-ipf       : ClusterIP, HTTP/actuator on 8090
  - <release>-ipf-mllp  : LoadBalancer, TCP MLLP on 2575
*/ -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "subscription-service.ipf.fullname" . }}
  labels:
    {{- include "subscription-service.labels" . | nindent 4 }}
    app.kubernetes.io/component: ipf
spec:
  type: {{ .Values.ipf.http.service.type }}
  ports:
    - name: http
      port: {{ .Values.ipf.http.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "subscription-service.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: ipf
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "subscription-service.ipf.fullname" . }}-mllp
  labels:
    {{- include "subscription-service.labels" . | nindent 4 }}
    app.kubernetes.io/component: ipf
spec:
  type: {{ .Values.ipf.mllp.service.type }}
  {{- if .Values.ipf.mllp.service.loadBalancerIP }}
  loadBalancerIP: {{ .Values.ipf.mllp.service.loadBalancerIP }}
  {{- end }}
  ports:
    - name: mllp
      port: {{ .Values.ipf.mllp.service.port }}
      targetPort: mllp
      protocol: TCP
  selector:
    {{- include "subscription-service.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: ipf
