apiVersion: v1
kind: Service
metadata:
  name: {{ include "subscription-service.postgres.fullname" . }}
  labels:
    {{- include "subscription-service.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  type: ClusterIP
  # Headless DNS so the StatefulSet pod gets a stable DNS A record.
  clusterIP: None
  ports:
    - name: postgres
      port: {{ .Values.postgres.service.port }}
      targetPort: postgres
      protocol: TCP
  selector:
    {{- include "subscription-service.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
