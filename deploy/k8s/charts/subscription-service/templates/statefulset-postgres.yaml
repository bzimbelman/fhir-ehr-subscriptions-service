{{- /*
Postgres for HAPI. Self-rolled rather than depending on bitnami/postgresql
because (a) the chart already brings four other workloads and one more
subchart is more deploy-time surface than payoff, (b) the image is just
postgres:16-alpine — identical to the Compose stack — and the JPA dialect
in HAPI is fixed to HapiFhirPostgresDialect regardless. Upgrade ergonomics:
the PVC survives `helm uninstall`; bumping the postgres image tag is an
in-place StatefulSet rolling update.

Skipped entirely when externalPostgres.enabled (ticket #416) — HAPI is
pointed at the managed Postgres outside the cluster instead.
*/ -}}
{{- if not .Values.externalPostgres.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "subscription-service.postgres.fullname" . }}
  labels:
    {{- include "subscription-service.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  replicas: 1
  serviceName: {{ include "subscription-service.postgres.fullname" . }}
  selector:
    matchLabels:
      {{- include "subscription-service.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: postgres
  template:
    metadata:
      labels:
        {{- include "subscription-service.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: postgres
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- include "subscription-service.podSecurityContext" (dict "ctx" . "workload" "postgres") | nindent 8 }}
      containers:
        - name: postgres
          image: "{{ .Values.image.postgres.repository }}:{{ .Values.image.postgres.tag }}"
          imagePullPolicy: {{ .Values.image.postgres.pullPolicy }}
          securityContext:
            {{- include "subscription-service.securityContext" (dict "ctx" . "workload" "postgres") | nindent 12 }}
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          envFrom:
            - secretRef:
                name: {{ include "subscription-service.postgres.fullname" . }}
          env:
            # Match the Compose stack: PGDATA in a subdir so the empty $PGDATA
            # bootstrap doesn't choke on a non-empty volume root (lost+found,
            # etc. on some PV provisioners).
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
            # Interface-engine's own database (Epic #378). Consumed by the
            # init script mounted below.
            - name: IPF_DB_USER
              value: {{ .Values.interfaceEngineDb.user | quote }}
            - name: IPF_DB_NAME
              value: {{ .Values.interfaceEngineDb.database | quote }}
            - name: IPF_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "subscription-service.fullname" . }}-ipf-db
                  key: password
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "{{ .Values.postgres.user }}", "-d", "{{ .Values.postgres.database }}"]
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 20
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "{{ .Values.postgres.user }}", "-d", "{{ .Values.postgres.database }}"]
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.postgres.resources | nindent 12 }}
      volumes:
        - name: init-scripts
          configMap:
            name: {{ include "subscription-service.fullname" . }}-postgres-init
            defaultMode: 0755
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.postgres.storage.storageClassName }}
        storageClassName: {{ .Values.postgres.storage.storageClassName | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.postgres.storage.size | quote }}
{{- end }}
