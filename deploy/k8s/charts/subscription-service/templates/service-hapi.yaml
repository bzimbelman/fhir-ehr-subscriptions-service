apiVersion: v1
kind: Service
metadata:
  name: {{ include "subscription-service.hapi.fullname" . }}
  labels:
    {{- include "subscription-service.labels" . | nindent 4 }}
    app.kubernetes.io/component: hapi
spec:
  type: {{ .Values.hapi.service.type }}
  ports:
    - name: http
      port: {{ .Values.hapi.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "subscription-service.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: hapi
