{{- /*
Postgres init script ConfigMap (Epic #378, ticket #379).

Mounted at /docker-entrypoint-initdb.d/ in the postgres container, runs ONCE
on first boot (when PGDATA is empty) to create the interface-engine's own
database alongside HAPI's. Identical SQL to deploy/docker/postgres-init/
so Compose and k8s targets stay in lock-step.

Skipped when externalPostgres.enabled — there's no in-cluster Postgres to
init when HAPI is pointed at a managed DB.
*/ -}}
{{- if not .Values.externalPostgres.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "subscription-service.fullname" . }}-postgres-init
  labels:
    {{- include "subscription-service.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
data:
  01-create-ipf-db.sh: |
    #!/usr/bin/env bash
    # Create the interface-engine's database + user on first boot.
    set -euo pipefail
    : "${IPF_DB_USER:?IPF_DB_USER must be set}"
    : "${IPF_DB_PASSWORD:?IPF_DB_PASSWORD must be set}"
    : "${IPF_DB_NAME:?IPF_DB_NAME must be set}"
    echo "[postgres-init] creating role ${IPF_DB_USER} and database ${IPF_DB_NAME}"
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "postgres" <<-SQL
        DO \$\$
        BEGIN
            IF NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = '${IPF_DB_USER}') THEN
                CREATE ROLE ${IPF_DB_USER} LOGIN PASSWORD '${IPF_DB_PASSWORD}';
            END IF;
        END
        \$\$;
        SELECT 'CREATE DATABASE ${IPF_DB_NAME} OWNER ${IPF_DB_USER}'
        WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = '${IPF_DB_NAME}')\gexec
        GRANT ALL PRIVILEGES ON DATABASE ${IPF_DB_NAME} TO ${IPF_DB_USER};
    SQL
    echo "[postgres-init] done"
{{- end }}
