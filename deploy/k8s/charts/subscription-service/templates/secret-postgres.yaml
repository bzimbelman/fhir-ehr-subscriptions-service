{{- /*
Postgres credentials. The chart owns the secret so HAPI and the StatefulSet
reference the same source of truth. Override .postgres.password in
values-prod.yaml (or wire in a sealed/external secret manager) before any
non-dev use. The default password is "hapi" — DO NOT ship that to prod.
*/ -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "subscription-service.postgres.fullname" . }}
  labels:
    {{- include "subscription-service.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
type: Opaque
stringData:
  POSTGRES_USER: {{ .Values.postgres.user | quote }}
  POSTGRES_PASSWORD: {{ .Values.postgres.password | quote }}
  POSTGRES_DB: {{ .Values.postgres.database | quote }}
