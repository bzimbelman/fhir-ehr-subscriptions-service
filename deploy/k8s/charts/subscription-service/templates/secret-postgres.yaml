{{- /*
Postgres credentials. The chart owns the Secret so HAPI and the StatefulSet
reference the same source of truth. Password precedence (ticket #419):

  1. .Values.postgres.password — explicit override (recommended path: layer
     it in via a sealed/external secret manager, not a values file in git).
  2. Existing Secret in the namespace — preserved across `helm upgrade` so
     a generated password stays stable for the life of the install.
  3. randAlphaNum 32 — auto-generated on first install when neither of the
     above is set. Means no operator can accidentally ship the old "hapi"
     literal default to a real cluster.

For real production, prefer (1) via sealed-secrets / external-secrets / SOPS,
or set externalPostgres.enabled: true (ticket #416) and point at a managed
Postgres outside the chart entirely. In that mode this Secret is NOT
rendered — the operator pre-creates their own Secret per the
externalPostgres.passwordSecret value, and the chart never overwrites it.
*/ -}}
{{- if not .Values.externalPostgres.enabled }}
{{- $secretName := include "subscription-service.postgres.fullname" . -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- $password := "" -}}
{{- if .Values.postgres.password -}}
  {{- $password = .Values.postgres.password -}}
{{- else if and $existing $existing.data (index $existing.data "POSTGRES_PASSWORD") -}}
  {{- $password = index $existing.data "POSTGRES_PASSWORD" | b64dec -}}
{{- else -}}
  {{- $password = randAlphaNum 32 -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "subscription-service.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
type: Opaque
stringData:
  POSTGRES_USER: {{ .Values.postgres.user | quote }}
  POSTGRES_PASSWORD: {{ $password | quote }}
  POSTGRES_DB: {{ .Values.postgres.database | quote }}
{{- end }}
