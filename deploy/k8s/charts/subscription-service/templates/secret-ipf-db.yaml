{{- /*
Interface-engine database password Secret (Epic #378, ticket #379).

Same auto-generate + preserve-on-upgrade pattern as the HAPI postgres Secret
(ticket #419): explicit value wins, else read existing Secret, else
randAlphaNum 32 on first install.

Not rendered when externalPostgres.enabled — there's no in-cluster IPF DB
in that mode either; if the operator wants a managed Postgres for the
interface engine too, that's a separate value block we'd add later.
*/ -}}
{{- if not .Values.externalPostgres.enabled }}
{{- $secretName := printf "%s-ipf-db" (include "subscription-service.fullname" .) -}}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- $password := "" -}}
{{- if .Values.interfaceEngineDb.password -}}
  {{- $password = .Values.interfaceEngineDb.password -}}
{{- else if and $existingSecret $existingSecret.data -}}
  {{- $password = index $existingSecret.data "password" | b64dec -}}
{{- else -}}
  {{- $password = randAlphaNum 32 -}}
{{- end -}}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "subscription-service.labels" . | nindent 4 }}
    app.kubernetes.io/component: interface-engine-db
type: Opaque
data:
  password: {{ $password | b64enc | quote }}
{{- end }}
