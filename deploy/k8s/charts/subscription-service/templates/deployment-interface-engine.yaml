{{- /*
Interface engine — Spring Boot + IPF (HL7v2 MLLP listener + Camel router).
Talks to HAPI (for persistence) and Matchbox (for $transform). Two ports:

  - 8090: Spring Boot HTTP + actuator. ClusterIP service for in-cluster
    health checks and any future REST surface.
  - 2575: MLLP listener. LoadBalancer service so EHR senders outside the
    cluster can reach it; on Rancher Desktop the klipper-lb daemonset puts
    it on localhost:2575.
*/ -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "subscription-service.interfaceEngine.fullname" . }}
  labels:
    {{- include "subscription-service.labels" . | nindent 4 }}
    app.kubernetes.io/component: interface-engine
spec:
  replicas: {{ .Values.interfaceEngine.replicaCount }}
  selector:
    matchLabels:
      {{- include "subscription-service.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: interface-engine
  template:
    metadata:
      labels:
        {{- include "subscription-service.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: interface-engine
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- include "subscription-service.podSecurityContext" (dict "ctx" . "workload" "interfaceEngine") | nindent 8 }}
      containers:
        - name: interface-engine
          image: "{{ .Values.image.interfaceEngine.repository }}:{{ .Values.image.interfaceEngine.tag }}"
          imagePullPolicy: {{ .Values.image.interfaceEngine.pullPolicy }}
          ports:
            - name: http
              containerPort: 8090
              protocol: TCP
            - name: mllp
              containerPort: 2575
              protocol: TCP
          env:
            - name: HAPI_BASE
              value: http://{{ include "subscription-service.hapi.fullname" . }}:{{ .Values.hapi.service.port }}/fhir
            - name: MATCHBOX_BASE
              value: http://{{ include "subscription-service.matchbox.fullname" . }}:{{ .Values.matchbox.service.port }}/matchboxv3/fhir
            - name: MLLP_PORT
              value: "2575"
            {{- if not .Values.externalPostgres.enabled }}
            # Interface-engine's own Postgres (Epic #378). Same Postgres
            # server as HAPI; separate database. When externalPostgres is
            # enabled, the in-cluster IPF DB doesn't exist — operators
            # provisioning a fully-external setup must supply IPF_DB_URL,
            # IPF_DB_USER, and IPF_DB_PASSWORD via their own mechanism
            # (envFrom a pre-created Secret, etc.).
            - name: IPF_DB_URL
              value: jdbc:postgresql://{{ include "subscription-service.postgres.fullname" . }}:{{ .Values.postgres.service.port }}/{{ .Values.interfaceEngineDb.database }}
            - name: IPF_DB_USER
              value: {{ .Values.interfaceEngineDb.user | quote }}
            - name: IPF_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "subscription-service.fullname" . }}-ipf-db
                  key: password
            {{- end }}
            # Admin REST API bearer token (Epic #378, ticket #384). Empty
            # value = unauthenticated admin endpoints (dev only — the app
            # logs a WARN at startup). Set
            # `interfaceEngine.admin.authToken` in values to enable.
            - name: IPF_ADMIN_AUTH_TOKEN
              value: {{ .Values.interfaceEngine.admin.authToken | default "" | quote }}
            # Async worker (Epic #378, ticket #382). See
            # `interfaceEngine.worker` in values.yaml for the meaning of
            # each knob. The bean is @ConditionalOnProperty-gated, so
            # setting enabled=false produces a truly inert worker
            # subsystem (no scheduled task, no @PostConstruct, nothing).
            - name: IPF_WORKER_ENABLED
              value: {{ .Values.interfaceEngine.worker.enabled | default true | quote }}
            - name: IPF_WORKER_POLL_MS
              value: {{ .Values.interfaceEngine.worker.pollIntervalMs | default 1000 | quote }}
            - name: IPF_WORKER_BATCH_SIZE
              value: {{ .Values.interfaceEngine.worker.batchSize | default 10 | quote }}
            - name: IPF_WORKER_TRANSFORMING_STALE_SECONDS
              value: {{ .Values.interfaceEngine.worker.transformingStaleSeconds | default 60 | quote }}
            # Retry policy (Epic #378, ticket #383). After
            # `retry.maxAttempts` failures a row hits DEAD_LETTER; until
            # then each failure schedules a backoff retry. See
            # interfaceEngine.worker.retry in values.yaml.
            - name: IPF_MAX_ATTEMPTS
              value: {{ .Values.interfaceEngine.worker.retry.maxAttempts | default 5 | quote }}
            - name: IPF_BACKOFF_BASE_MS
              value: {{ .Values.interfaceEngine.worker.retry.backoffBaseMs | default 1000 | quote }}
            - name: IPF_BACKOFF_MAX_MS
              value: {{ .Values.interfaceEngine.worker.retry.backoffMaxMs | default 300000 | quote }}
            - name: IPF_BACKOFF_FACTOR
              value: {{ .Values.interfaceEngine.worker.retry.backoffFactor | default "2.0" | quote }}
            - name: IPF_DLQ_LOG_LEVEL
              value: {{ .Values.interfaceEngine.worker.retry.dlqLogLevel | default "WARN" | quote }}
            # JSON log layout / pretty-print profile (Epic #387, ticket #388).
            # The interface-engine's logback config lives at
            # `interface-engine/src/main/resources/logback-spring.xml` and
            # is loaded automatically by Spring Boot — no LOGGING_CONFIG
            # needed (unlike the HAPI side, where the JAR-bundled config
            # has a unique name to dodge the upstream image's logback.xml).
            # SPRING_PROFILES_ACTIVE=dev enables pretty-printed JSON for
            # local debugging; default is the compact prod layout.
            - name: SPRING_PROFILES_ACTIVE
              value: {{ .Values.interfaceEngine.profiles | default "" | quote }}
            # OpenTelemetry distributed tracing (Epic #387, ticket #394). The
            # SDK reads these env vars directly via
            # AutoConfiguredOpenTelemetrySdk; we don't need a config-file
            # mapping. When `otel.enabled: false` (the default), the SDK is
            # disabled and span recording becomes a no-op — no overhead.
            - name: OTEL_SDK_DISABLED
              value: {{ not .Values.otel.enabled | quote }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.otel.endpoint | default "" | quote }}
            - name: OTEL_SERVICE_NAME
              value: subscription-service-interface-engine
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: {{ .Values.otel.resourceAttributes | default "" | quote }}
          # Liveness vs readiness split (Epic #387, ticket #393).
          #
          # Liveness (kubelet restarts a DOWN pod): only JVM-internal stuff —
          # `ping` + `db`. If Matchbox/HAPI are down that's NOT a liveness
          # failure (restarting our pod won't fix the downstream). Slow and
          # tolerant timings so a transient hiccup doesn't restart us.
          #
          # Readiness (kubelet removes a DOWN pod from Service endpoints
          # but leaves it running): full health — `ping` + `db` +
          # `matchbox` + `hapi` + `dlqBacklog`. Faster + stricter timings
          # so a dead downstream takes us out of rotation in ~30s.
          #
          # The two groups are defined in
          # interface-engine/.../application.yaml under
          # `management.endpoint.health.group`.
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          resources:
            {{- toYaml .Values.interfaceEngine.resources | nindent 12 }}
          securityContext:
            {{- include "subscription-service.securityContext" (dict "ctx" . "workload" "interfaceEngine") | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
