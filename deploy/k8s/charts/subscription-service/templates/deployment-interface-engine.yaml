{{- /*
Interface engine — Spring Boot + IPF (HL7v2 MLLP listener + Camel router).
Talks to HAPI (for persistence) and Matchbox (for $transform). Two ports:

  - 8090: Spring Boot HTTP + actuator. ClusterIP service for in-cluster
    health checks and any future REST surface.
  - 2575: MLLP listener. LoadBalancer service so EHR senders outside the
    cluster can reach it; on Rancher Desktop the klipper-lb daemonset puts
    it on localhost:2575.
*/ -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "subscription-service.interfaceEngine.fullname" . }}
  labels:
    {{- include "subscription-service.labels" . | nindent 4 }}
    app.kubernetes.io/component: interface-engine
spec:
  replicas: {{ .Values.interfaceEngine.replicaCount }}
  selector:
    matchLabels:
      {{- include "subscription-service.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: interface-engine
  template:
    metadata:
      labels:
        {{- include "subscription-service.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: interface-engine
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- include "subscription-service.podSecurityContext" (dict "ctx" . "workload" "interfaceEngine") | nindent 8 }}
      containers:
        - name: interface-engine
          image: "{{ .Values.image.interfaceEngine.repository }}:{{ .Values.image.interfaceEngine.tag }}"
          imagePullPolicy: {{ .Values.image.interfaceEngine.pullPolicy }}
          ports:
            - name: http
              containerPort: 8090
              protocol: TCP
            - name: mllp
              containerPort: 2575
              protocol: TCP
          env:
            - name: HAPI_BASE
              value: http://{{ include "subscription-service.hapi.fullname" . }}:{{ .Values.hapi.service.port }}/fhir
            - name: MATCHBOX_BASE
              value: http://{{ include "subscription-service.matchbox.fullname" . }}:{{ .Values.matchbox.service.port }}/matchboxv3/fhir
            - name: MLLP_PORT
              value: "2575"
            {{- if not .Values.externalPostgres.enabled }}
            # Interface-engine's own Postgres (Epic #378). Same Postgres
            # server as HAPI; separate database. When externalPostgres is
            # enabled, the in-cluster IPF DB doesn't exist — operators
            # provisioning a fully-external setup must supply IPF_DB_URL,
            # IPF_DB_USER, and IPF_DB_PASSWORD via their own mechanism
            # (envFrom a pre-created Secret, etc.).
            - name: IPF_DB_URL
              value: jdbc:postgresql://{{ include "subscription-service.postgres.fullname" . }}:{{ .Values.postgres.service.port }}/{{ .Values.interfaceEngineDb.database }}
            - name: IPF_DB_USER
              value: {{ .Values.interfaceEngineDb.user | quote }}
            - name: IPF_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "subscription-service.fullname" . }}-ipf-db
                  key: password
            {{- end }}
            # Admin REST API bearer token (Epic #378, ticket #384). Empty
            # value = unauthenticated admin endpoints (dev only — the app
            # logs a WARN at startup). Set
            # `interfaceEngine.admin.authToken` in values to enable.
            - name: IPF_ADMIN_AUTH_TOKEN
              value: {{ .Values.interfaceEngine.admin.authToken | default "" | quote }}
            # Async worker (Epic #378, ticket #382). See
            # `interfaceEngine.worker` in values.yaml for the meaning of
            # each knob. The bean is @ConditionalOnProperty-gated, so
            # setting enabled=false produces a truly inert worker
            # subsystem (no scheduled task, no @PostConstruct, nothing).
            - name: IPF_WORKER_ENABLED
              value: {{ .Values.interfaceEngine.worker.enabled | default true | quote }}
            - name: IPF_WORKER_POLL_MS
              value: {{ .Values.interfaceEngine.worker.pollIntervalMs | default 1000 | quote }}
            - name: IPF_WORKER_BATCH_SIZE
              value: {{ .Values.interfaceEngine.worker.batchSize | default 10 | quote }}
            - name: IPF_WORKER_TRANSFORMING_STALE_SECONDS
              value: {{ .Values.interfaceEngine.worker.transformingStaleSeconds | default 60 | quote }}
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          resources:
            {{- toYaml .Values.interfaceEngine.resources | nindent 12 }}
          securityContext:
            {{- include "subscription-service.securityContext" (dict "ctx" . "workload" "interfaceEngine") | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
