{{- if and .Values.ui.enabled .Values.ui.createSecret -}}
{{- /*
Synthesized Secret for dev/test deployments. In production, leave
`createSecret: false` and use `existingSecretName` to point at a
Secret managed out-of-band (sops, sealed-secrets, External Secrets
Operator, vault-injector, etc.).

When `existingSecretName` is also set the chart prefers that — this
template ONLY renders when `createSecret: true` AND we're not also
pointing at an external secret. The Deployment helper resolves the
right name either way.
*/ -}}
{{- if .Values.ui.existingSecretName -}}
{{- fail "ui.createSecret=true is mutually exclusive with ui.existingSecretName. Pick one." -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "subscription-service.ui.secretName" . }}
  labels:
    {{- include "subscription-service.labels" . | nindent 4 }}
    app.kubernetes.io/component: ui
type: Opaque
stringData:
  ADMIN_API_BEARER_TOKEN: {{ .Values.ui.secretValues.adminApiBearerToken | quote }}
  AUTH_SECRET: {{ .Values.ui.secretValues.authSecret | quote }}
  OIDC_CLIENT_SECRET: {{ .Values.ui.secretValues.oidcClientSecret | quote }}
{{- end }}
