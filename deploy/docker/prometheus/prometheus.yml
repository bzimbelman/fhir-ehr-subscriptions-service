# Prometheus scrape config for the bundled docker-compose observability
# profile (Epic #387, ticket #395). Scrapes both Spring Boot Actuator
# Prometheus exposition endpoints:
#
#   - interface-engine: port 8090, path /actuator/prometheus
#   - hapi:             port 8080, path /actuator/prometheus
#
# Target hostnames are the docker-compose service names; this file is
# only useful when running from inside the same compose network. For a
# Kubernetes deployment, scrape via the Prometheus Operator
# ServiceMonitor bundled in the Helm chart (#418), not this file.
#
# Retention is set on the prometheus CLI flag (see docker-compose.yml)
# rather than here because retention is a TSDB-engine concern, not a
# scrape-config concern.
global:
  scrape_interval: 15s
  scrape_timeout: 10s
  external_labels:
    deployment: subscription-service-compose

scrape_configs:
  - job_name: interface-engine
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - interface-engine:8090
        labels:
          service: interface-engine

  - job_name: hapi
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - hapi:8080
        labels:
          service: hapi
