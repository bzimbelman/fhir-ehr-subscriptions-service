# subscription-service — reference Docker Compose stack.
#
# Brings up HAPI FHIR R4 on Postgres with US Core 7.0 + the R5 Subscriptions
# Backport IG loaded at boot, plus Matchbox for HL7 v2-to-FHIR transforms.
# See deploy/docker/README.md for stand-up/tear-down. Env vars: .env.example.
#
# Tickets: #354 (HAPI + Postgres), #355 (Matchbox), #356 (IGs + config),
#          #360 (IPF MLLP scaffold).

services:
  hapi-db:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    container_name: subscription-service-hapi-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hapi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hapi}
      POSTGRES_DB: ${POSTGRES_DB:-hapi}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ${POSTGRES_DATA_DIR:-./postgres-data}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hapi} -d ${POSTGRES_DB:-hapi}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    networks:
      - subscription-service

  hapi:
    # Derived image layers the subscription-service auth JAR onto upstream
    # HAPI. Source: hapi/Dockerfile + hapi/auth/. Built locally on
    # `docker compose up --build`; pinning the image name keeps the
    # entrypoint and metadata identical to the upstream image so the rest
    # of this compose file (volumes, healthcheck, ports) is unaffected.
    build:
      context: ../../hapi
      dockerfile: Dockerfile
    image: ${HAPI_IMAGE:-subscription-service/hapi:dev}
    container_name: subscription-service-hapi
    restart: unless-stopped
    depends_on:
      hapi-db:
        condition: service_healthy
    environment:
      # Spring picks up /app/config/application.yaml automatically because /app
      # is the working dir; we mount the file in below.
      SPRING_DATASOURCE_URL: jdbc:postgresql://hapi-db:5432/${POSTGRES_DB:-hapi}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-hapi}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-hapi}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: ca.uhn.fhir.jpa.model.dialect.HapiFhirPostgresDialect
      # Feature toggles. SUBSCRIPTION_SERVICE_VALIDATION_MODE wired in #367 — off|warn|enforce.
      # The other two (#368, #369) are still stubs.
      SUBSCRIPTION_SERVICE_VALIDATION_MODE: ${SUBSCRIPTION_SERVICE_VALIDATION_MODE:-off}
      SUBSCRIPTION_SERVICE_CHANNEL_SECURITY: ${SUBSCRIPTION_SERVICE_CHANNEL_SECURITY:-strict}
      SUBSCRIPTION_SERVICE_MULTITENANCY: ${SUBSCRIPTION_SERVICE_MULTITENANCY:-disabled}
      # Auth toggle (#359). When `false`, the auth auto-configuration short-
      # circuits and HAPI behaves like the upstream image — useful for local
      # dev without a Keycloak. Default is `true`; flip to `false` via
      # .env or by exporting SUBSCRIPTION_SERVICE_AUTH_ENABLED=false.
      SUBSCRIPTION_SERVICE_AUTH_ENABLED: ${SUBSCRIPTION_SERVICE_AUTH_ENABLED:-true}
      SUBSCRIPTION_SERVICE_AUTH_ISSUER: ${SUBSCRIPTION_SERVICE_AUTH_ISSUER:-https://keycloak.bzonfhir.com/auth/realms/subscription-service}
      SUBSCRIPTION_SERVICE_AUTH_JWKS_URL: ${SUBSCRIPTION_SERVICE_AUTH_JWKS_URL:-}
    volumes:
      - ../../hapi/application.yaml:/app/config/application.yaml:ro
      - ../../hapi/igs:/app/igs:ro
      # Single-file Java healthcheck probe — see `healthcheck:` block below.
      - ../../hapi/healthcheck:/app/healthcheck:ro
    ports:
      - "${HAPI_HOST_PORT:-18080}:8080"
    healthcheck:
      # hapiproject/hapi:v7.6.0 is a distroless image — no shell, no curl, no
      # wget, no busybox; only the JRE (`java`). The original CMD-SHELL probe
      # from #354 was non-functional because Docker requires `/bin/sh` to run
      # CMD-SHELL entries and that binary isn't in the image.
      #
      # Workaround: a minimal JEP 330 single-file Java probe that connects to
      # localhost:8080 and exits 0 on success. The file is baked into the
      # `hapi/healthcheck` bind-mount below. This is a #354 follow-up; the
      # right long-term answer is either:
      #   (a) build our own HAPI image FROM eclipse-temurin:21-jre-jammy which
      #       has a real shell + curl, or
      #   (b) wait for hapiproject/hapi to add a `/actuator/health` probe.
      test:
        - CMD
        - java
        - /app/healthcheck/HapiHealthCheck.java
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 120s
    networks:
      - subscription-service

  matchbox:
    image: ${MATCHBOX_IMAGE:-europe-west6-docker.pkg.dev/ahdis-ch/ahdis/matchbox:v3.9.13}
    container_name: subscription-service-matchbox
    restart: unless-stopped
    environment:
      MATCHBOX_FHIR_VERSION: R4
      # Matchbox v3 ships under the /matchboxv3 context path; override the
      # bundled healthcheck URL to point at the actuator under that prefix.
      HEALTHCHECK_URL: http://localhost:8080/matchboxv3/fhir/metadata
    volumes:
      # Any *.tgz IG packages dropped here are loaded into Matchbox at boot.
      - ../../matchbox/igs:/app/matchbox/igs:ro
    ports:
      - "${MATCHBOX_HOST_PORT:-18081}:8080"
    healthcheck:
      # Matchbox v3 mounts FHIR under /matchboxv3/fhir, NOT /fhir.
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/matchboxv3/fhir/metadata >/dev/null || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 90s
    networks:
      - subscription-service

  ipf-app:
    build:
      context: ../../ipf-app
      dockerfile: Dockerfile
    image: ${IPF_IMAGE:-subscription-service/ipf-app:dev}
    container_name: subscription-service-ipf-app
    restart: unless-stopped
    depends_on:
      hapi:
        condition: service_healthy
      matchbox:
        condition: service_healthy
    environment:
      HAPI_BASE: http://hapi:8080/fhir
      MATCHBOX_BASE: http://matchbox:8080/matchboxv3/fhir
      MLLP_PORT: "2575"
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-}
    ports:
      - "${IPF_HTTP_HOST_PORT:-18090}:8090"
      - "${IPF_MLLP_HOST_PORT:-2575}:2575"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8090/actuator/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s
    networks:
      - subscription-service

networks:
  subscription-service:
    name: subscription-service
    driver: bridge
