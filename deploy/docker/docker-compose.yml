# subscription-service — reference Docker Compose stack.
#
# Brings up HAPI FHIR R4 on Postgres with US Core 7.0 + the R5 Subscriptions
# Backport IG loaded at boot, plus Matchbox for HL7 v2-to-FHIR transforms.
# See deploy/docker/README.md for stand-up/tear-down. Env vars: .env.example.
#
# Tickets: #354 (HAPI + Postgres), #355 (Matchbox), #356 (IGs + config),
#          #360 (IPF MLLP scaffold).

services:
  hapi-db:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    container_name: subscription-service-hapi-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hapi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hapi}
      POSTGRES_DB: ${POSTGRES_DB:-hapi}
      PGDATA: /var/lib/postgresql/data/pgdata
      # Interface-engine's own DB (Epic #378). Consumed by the init script
      # in /docker-entrypoint-initdb.d/ on first boot.
      IPF_DB_USER: ${IPF_DB_USER:-ipf}
      IPF_DB_PASSWORD: ${IPF_DB_PASSWORD:-ipf}
      IPF_DB_NAME: ${IPF_DB_NAME:-ipf}
    volumes:
      - ${POSTGRES_DATA_DIR:-./postgres-data}:/var/lib/postgresql/data
      # Init scripts run ONCE on first boot (when PGDATA is empty) to set up
      # the IPF database alongside HAPI's. To pick up changes here on an
      # already-initialized volume, wipe POSTGRES_DATA_DIR or run the SQL
      # by hand.
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hapi} -d ${POSTGRES_DB:-hapi}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    networks:
      - subscription-service

  hapi:
    # Derived image layers the subscription-service auth JAR onto upstream
    # HAPI. Source: hapi/Dockerfile + hapi/auth/. Built locally on
    # `docker compose up --build`; pinning the image name keeps the
    # entrypoint and metadata identical to the upstream image so the rest
    # of this compose file (volumes, healthcheck, ports) is unaffected.
    build:
      context: ../../hapi
      dockerfile: Dockerfile
    image: ${HAPI_IMAGE:-subscription-service/hapi:dev}
    container_name: subscription-service-hapi
    restart: unless-stopped
    depends_on:
      hapi-db:
        condition: service_healthy
    environment:
      # Spring picks up /app/config/application.yaml automatically because /app
      # is the working dir; we mount the file in below.
      SPRING_DATASOURCE_URL: jdbc:postgresql://hapi-db:5432/${POSTGRES_DB:-hapi}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-hapi}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-hapi}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: ca.uhn.fhir.jpa.model.dialect.HapiFhirPostgresDialect
      # Feature toggles — all three implemented:
      # - #367 SUBSCRIPTION_SERVICE_VALIDATION_MODE (off|warn|enforce)
      # - #368 SUBSCRIPTION_SERVICE_CHANNEL_SECURITY (strict|relaxed|permissive)
      # - #369 SUBSCRIPTION_SERVICE_MULTITENANCY (disabled|enabled)
      # See docs/architecture.md and docs/multi-tenancy.md.
      SUBSCRIPTION_SERVICE_VALIDATION_MODE: ${SUBSCRIPTION_SERVICE_VALIDATION_MODE:-off}
      SUBSCRIPTION_SERVICE_CHANNEL_SECURITY: ${SUBSCRIPTION_SERVICE_CHANNEL_SECURITY:-strict}
      SUBSCRIPTION_SERVICE_MULTITENANCY: ${SUBSCRIPTION_SERVICE_MULTITENANCY:-disabled}
      SUBSCRIPTION_SERVICE_MULTITENANCY_TENANT_CLAIM: ${SUBSCRIPTION_SERVICE_MULTITENANCY_TENANT_CLAIM:-tenant}
      # TEST ONLY — when `true`, the partition interceptor reads the tenant from
      # the `X-Test-Tenant` HTTP header instead of the JWT. Used by the e2e
      # isolation suite. Never set this on a production deployment.
      SUBSCRIPTION_SERVICE_MULTITENANCY_TEST_MODE: ${SUBSCRIPTION_SERVICE_MULTITENANCY_TEST_MODE:-false}
      # Auth toggle (#359). When `false`, the auth auto-configuration short-
      # circuits and HAPI behaves like the upstream image — useful for the
      # quickstart and for local dev without an OIDC provider configured.
      # Default is `false` to match .env.example; flip to `true` once you
      # have an issuer URL set below.
      SUBSCRIPTION_SERVICE_AUTH_ENABLED: ${SUBSCRIPTION_SERVICE_AUTH_ENABLED:-false}
      # No baked-in default — set SUBSCRIPTION_SERVICE_AUTH_ISSUER in .env. When
      # AUTH_ENABLED=true and ISSUER is empty, HAPI fails fast at startup with a
      # documented error (ticket #370). For local dev without Keycloak, set
      # SUBSCRIPTION_SERVICE_AUTH_ENABLED=false instead.
      SUBSCRIPTION_SERVICE_AUTH_ISSUER: ${SUBSCRIPTION_SERVICE_AUTH_ISSUER:-}
      SUBSCRIPTION_SERVICE_AUTH_JWKS_URL: ${SUBSCRIPTION_SERVICE_AUTH_JWKS_URL:-}
      # FHIR AuditEvent generator (ticket #391). Default ON. Reads/searches are
      # opt-in via SUBSCRIPTION_SERVICE_AUDIT_CAPTURE_READS / _CAPTURE_SEARCH.
      SUBSCRIPTION_SERVICE_AUDIT_ENABLED: ${SUBSCRIPTION_SERVICE_AUDIT_ENABLED:-true}
      SUBSCRIPTION_SERVICE_AUDIT_CAPTURE_READS: ${SUBSCRIPTION_SERVICE_AUDIT_CAPTURE_READS:-false}
      SUBSCRIPTION_SERVICE_AUDIT_CAPTURE_SEARCH: ${SUBSCRIPTION_SERVICE_AUDIT_CAPTURE_SEARCH:-false}
      SUBSCRIPTION_SERVICE_AUDIT_RETENTION_DAYS: ${SUBSCRIPTION_SERVICE_AUDIT_RETENTION_DAYS:-365}
      # OpenTelemetry distributed tracing (Epic #387, ticket #394). Off by
      # default — the SDK is built as a no-op, no spans recorded, no
      # exporter. Flip OTEL_SDK_DISABLED=false (and set an endpoint via
      # OTEL_EXPORTER_OTLP_ENDPOINT) when a collector is running. The
      # `--profile observability` flag brings up the bundled jaeger
      # service below; combined with OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      # in your .env, traces flow there end-to-end.
      OTEL_SDK_DISABLED: ${OTEL_SDK_DISABLED:-true}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_SERVICE_NAME: subscription-service-hapi
      OTEL_RESOURCE_ATTRIBUTES: ${OTEL_RESOURCE_ATTRIBUTES:-}
    volumes:
      - ../../hapi/application.yaml:/app/config/application.yaml:ro
      - ../../hapi/igs:/app/igs:ro
      # Single-file Java healthcheck probe — see `healthcheck:` block below.
      - ../../hapi/healthcheck:/app/healthcheck:ro
    ports:
      - "${HAPI_HOST_PORT:-18080}:8080"
    healthcheck:
      # hapiproject/hapi:v7.6.0 is a distroless image — no shell, no curl, no
      # wget, no busybox; only the JRE (`java`). The original CMD-SHELL probe
      # from #354 was non-functional because Docker requires `/bin/sh` to run
      # CMD-SHELL entries and that binary isn't in the image.
      #
      # Workaround: a minimal JEP 330 single-file Java probe that connects to
      # localhost:8080 and exits 0 on success. The file is baked into the
      # `hapi/healthcheck` bind-mount below. This is a #354 follow-up; the
      # right long-term answer is either:
      #   (a) build our own HAPI image FROM eclipse-temurin:21-jre-jammy which
      #       has a real shell + curl, or
      #   (b) wait for hapiproject/hapi to add a `/actuator/health` probe.
      test:
        - CMD
        - java
        - /app/healthcheck/HapiHealthCheck.java
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 120s
    networks:
      - subscription-service

  matchbox:
    image: ${MATCHBOX_IMAGE:-europe-west6-docker.pkg.dev/ahdis-ch/ahdis/matchbox:v3.9.13}
    container_name: subscription-service-matchbox
    restart: unless-stopped
    environment:
      MATCHBOX_FHIR_VERSION: R4
      # Matchbox v3 ships under the /matchboxv3 context path; override the
      # bundled healthcheck URL to point at the actuator under that prefix.
      HEALTHCHECK_URL: http://localhost:8080/matchboxv3/fhir/metadata
    volumes:
      # Any *.tgz IG packages dropped here are loaded into Matchbox at boot.
      - ../../matchbox/igs:/app/matchbox/igs:ro
    ports:
      - "${MATCHBOX_HOST_PORT:-18081}:8080"
    healthcheck:
      # Matchbox v3 mounts FHIR under /matchboxv3/fhir, NOT /fhir.
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/matchboxv3/fhir/metadata >/dev/null || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 90s
    networks:
      - subscription-service

  interface-engine:
    build:
      context: ../../interface-engine
      dockerfile: Dockerfile
    image: ${INTERFACE_ENGINE_IMAGE:-subscription-service/interface-engine:dev}
    container_name: subscription-service-interface-engine
    restart: unless-stopped
    depends_on:
      hapi-db:
        condition: service_healthy
      hapi:
        condition: service_healthy
      matchbox:
        condition: service_healthy
    environment:
      HAPI_BASE: http://hapi:8080/fhir
      MATCHBOX_BASE: http://matchbox:8080/matchboxv3/fhir
      MLLP_PORT: "2575"
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-}
      # Interface-engine's own Postgres database (Epic #378). Same Postgres
      # server as HAPI; separate database name + user.
      IPF_DB_URL: jdbc:postgresql://hapi-db:5432/${IPF_DB_NAME:-ipf}
      IPF_DB_USER: ${IPF_DB_USER:-ipf}
      IPF_DB_PASSWORD: ${IPF_DB_PASSWORD:-ipf}
      # Admin REST API bearer token (#384). Empty = open (dev only).
      IPF_ADMIN_AUTH_TOKEN: ${IPF_ADMIN_AUTH_TOKEN:-}
      # Async worker tuning (#382). See deploy/docker/.env.example for
      # meaning + default reasoning. The whole worker subsystem is
      # @ConditionalOnProperty-gated on IPF_WORKER_ENABLED, so setting
      # it to false disables the @Scheduled loop AND the bean itself
      # (useful for one-off "ingest-only" replicas).
      IPF_WORKER_ENABLED: ${IPF_WORKER_ENABLED:-true}
      IPF_WORKER_POLL_MS: ${IPF_WORKER_POLL_MS:-1000}
      IPF_WORKER_BATCH_SIZE: ${IPF_WORKER_BATCH_SIZE:-10}
      IPF_WORKER_TRANSFORMING_STALE_SECONDS: ${IPF_WORKER_TRANSFORMING_STALE_SECONDS:-60}
      # Retry policy (#383). See deploy/docker/.env.example for the
      # backoff formula + worked defaults. The whole worker subsystem is
      # @ConditionalOnProperty-gated, so when IPF_WORKER_ENABLED=false
      # these have no effect.
      IPF_MAX_ATTEMPTS: ${IPF_MAX_ATTEMPTS:-5}
      IPF_BACKOFF_BASE_MS: ${IPF_BACKOFF_BASE_MS:-1000}
      IPF_BACKOFF_MAX_MS: ${IPF_BACKOFF_MAX_MS:-300000}
      IPF_BACKOFF_FACTOR: ${IPF_BACKOFF_FACTOR:-2.0}
      IPF_DLQ_LOG_LEVEL: ${IPF_DLQ_LOG_LEVEL:-WARN}
      # OpenTelemetry tracing (#394). See the matching block on the `hapi`
      # service above for the env-var semantics; same defaults apply here
      # (OFF by default, no overhead unless OTEL_SDK_DISABLED=false).
      OTEL_SDK_DISABLED: ${OTEL_SDK_DISABLED:-true}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_SERVICE_NAME: subscription-service-interface-engine
      OTEL_RESOURCE_ATTRIBUTES: ${OTEL_RESOURCE_ATTRIBUTES:-}
    ports:
      - "${INTERFACE_ENGINE_HTTP_HOST_PORT:-18090}:8090"
      - "${INTERFACE_ENGINE_MLLP_HOST_PORT:-2575}:2575"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8090/actuator/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s
    networks:
      - subscription-service

  # Operator UI (Epic #398, ticket #408). Next.js 15 + NextAuth v5.
  #
  # Authenticates operators via OIDC against whatever IdP the rest of the
  # platform uses (Keycloak, Auth0, Okta, Authentik, ...). All admin-API
  # traffic is proxied through Next.js server routes so the
  # `IPF_ADMIN_AUTH_TOKEN` bearer never leaves the cluster.
  #
  # When OIDC env vars are blank the UI still boots — `/signin` renders a
  # "configure OIDC first" banner via the `isOidcConfigured` check in
  # ui/src/lib/auth.ts. Useful for the quickstart; flip the OIDC_*
  # variables to wire real auth.
  #
  # The UI defaults to publishing on host port 3000. Override
  # `UI_HOST_PORT` in .env if that clashes with something else on your
  # box. The interface-engine actuator is on 18090, HAPI on 18080, and
  # Matchbox on 18081, so the UI is the only service competing for the
  # "obvious" web port — kept that way intentionally.
  ui:
    build:
      context: ../../ui
      dockerfile: Dockerfile
    image: ${UI_IMAGE:-subscription-service-ui:local}
    container_name: subscription-service-ui
    restart: unless-stopped
    depends_on:
      interface-engine:
        condition: service_healthy
    environment:
      # In-cluster URL the Next.js server uses for /api/admin/* proxy
      # calls. The browser NEVER talks to this directly; the bearer
      # token stays server-side.
      ADMIN_API_BASE_URL: ${ADMIN_API_BASE_URL:-http://interface-engine:8090}
      # Bearer for the proxy → backend hop. Must match the value of
      # IPF_ADMIN_AUTH_TOKEN on the interface-engine service above.
      # Blank = unauthenticated (only OK for ephemeral local dev).
      ADMIN_API_BEARER_TOKEN: ${IPF_ADMIN_AUTH_TOKEN:-}
      # NextAuth v5 wants this set when running behind any proxy
      # (including the Docker bridge that terminates :3000 on the host).
      # See https://authjs.dev/getting-started/deployment#auth_trust_host.
      AUTH_TRUST_HOST: "true"
      # Session encryption secret. NextAuth v5 fails closed in
      # NODE_ENV=production if unset, so the UI container will refuse
      # to start until this is provided. Generate via
      #   openssl rand -base64 32
      AUTH_SECRET: ${AUTH_SECRET:-}
      # OIDC client config. When ALL THREE are blank the UI runs in
      # "configure OIDC first" mode — bootable but unsignable-into.
      # See deploy/docker/.env.example for per-IdP examples.
      OIDC_ISSUER: ${OIDC_ISSUER:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      # External URL the browser sees. NextAuth uses this to construct
      # the redirect URI registered with the OIDC provider. For non-
      # localhost deployments set this to the operator's actual URL.
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      # Optional human-readable deployment label shown in the top-bar.
      NEXT_PUBLIC_DEPLOYMENT_NAME: ${UI_DEPLOYMENT_NAME:-}
    ports:
      - "${UI_HOST_PORT:-3000}:3000"
    healthcheck:
      # /api/health is a tiny synchronous endpoint that never touches
      # the backend (see ui/src/app/api/health/route.ts). We only want
      # pod restarts when the Node process itself is wedged.
      test:
        - CMD
        - wget
        - --quiet
        - --tries=1
        - --spider
        - http://localhost:3000/api/health
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - subscription-service

  # OpenTelemetry collector + UI (Epic #387, ticket #394).
  #
  # Optional — only brought up when you pass `--profile observability` to
  # `docker compose up`. Without that flag this service is silently
  # ignored, so the default `docker compose up -d` workflow is
  # unchanged.
  #
  # Image: jaegertracing/jaeger:2.0.0 — the v2 monolith bundles the
  # collector, query, and UI into one container. Set COLLECTOR_OTLP_ENABLED=true
  # so the OTLP gRPC (:4317) and HTTP (:4318) receivers are wired.
  #
  # Wiring it into the rest of the stack: with this profile active, set
  # OTEL_SDK_DISABLED=false and OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
  # in your .env. Then visit http://localhost:16686 to see traces.
  jaeger:
    profiles: [observability]
    image: jaegertracing/jaeger:2.0.0
    container_name: subscription-service-jaeger
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "${JAEGER_UI_PORT:-16686}:16686"
      - "${JAEGER_OTLP_GRPC_PORT:-4317}:4317"
      - "${JAEGER_OTLP_HTTP_PORT:-4318}:4318"
    networks:
      - subscription-service

  # Prometheus + Grafana (Epic #387, ticket #395).
  #
  # Like jaeger above, these are gated behind `--profile observability` —
  # the default `docker compose up -d` skips them. They join the same
  # `subscription-service` docker network so Prometheus can scrape
  # interface-engine:8090 and hapi:8080 directly by service name.
  #
  # Scope reminder: this is a DEV / small-deployment recipe. Production
  # operators on Kubernetes should use the bundled ServiceMonitor (#418)
  # against a Prometheus Operator stack, NOT this compose Prometheus.
  # See docs/deployment-recipes/observability.md.
  prometheus:
    profiles: [observability]
    image: prom/prometheus:v3.0.1
    container_name: subscription-service-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=14d"
      - "--web.enable-lifecycle"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "${PROMETHEUS_HOST_PORT:-9090}:9090"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/ready"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - subscription-service

  grafana:
    profiles: [observability]
    image: grafana/grafana:11.4.0
    container_name: subscription-service-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      # Default admin/admin — the docs call this out as MUST-rotate on
      # first run. Operators set GRAFANA_ADMIN_PASSWORD in their .env.
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-admin}"
      # No public signup — local dev only, but lock it down anyway so a
      # leaked port doesn't immediately become a self-serve account farm.
      GF_USERS_ALLOW_SIGN_UP: "false"
      # Anonymous viewer access OFF by default. Operators who want a
      # zero-friction read-only public dashboard view should flip this
      # in their .env, not in this file.
      GF_AUTH_ANONYMOUS_ENABLED: "${GRAFANA_ANONYMOUS_ENABLED:-false}"
    volumes:
      # Datasource + dashboard providers live under provisioning/.
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      # Dashboard JSON files; loaded by the provider in
      # provisioning/dashboards/default.yaml.
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "${GRAFANA_HOST_PORT:-13000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - subscription-service

networks:
  subscription-service:
    name: subscription-service
    driver: bridge
