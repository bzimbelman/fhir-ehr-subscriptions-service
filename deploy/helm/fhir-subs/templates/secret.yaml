{{- /*
Renders an empty (but addressable) Secret only when the operator is NOT
using ExternalSecrets and has not pointed the chart at an existing Secret.
The pod expects the Secret to exist so projection volumes / env refs
resolve; the operator is responsible for populating it out of band
(kubectl create secret, sealed-secrets, sops, etc.).
*/}}
{{- if and (not .Values.externalSecrets.enabled) (not .Values.secrets.existingSecret) (not .Values.externalSecrets.existingSecret) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "fhir-subs.fullname" . }}-secrets
  labels:
    {{- include "fhir-subs.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
{{- end }}
