apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "fhir-subs.fullname" . }}
  labels:
    {{- include "fhir-subs.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "fhir-subs.selectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      # 25% surge / 0 unavailable preserves the PDB during rolling deploys.
      maxSurge: 25%
      maxUnavailable: 0
  template:
    metadata:
      labels:
        {{- include "fhir-subs.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        # Bounce pods when ConfigMap or Secret changes (B-35 SIGHUP path is
        # the slow lane; rollouts get a clean restart).
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "fhir-subs.serviceAccountName" . }}
      automountServiceAccountToken: false
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if .Values.migrationInit.enabled }}
      initContainers:
        # Validate config + secret resolution before main container starts.
        # Schema migrations run inside main, guarded by a Postgres advisory
        # lock (B-33), so they're safe with multi-replica rollouts. The init
        # container exists to fail-fast on bad config / unreadable secrets,
        # which would otherwise CrashLoopBackOff the main container.
        - name: config-check
          image: {{ include "fhir-subs.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --config
            - /etc/fhir-subs/config.yaml
            - --check-config
          env:
            {{- range .Values.secrets.env }}
            - name: {{ .name }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "fhir-subs.secretName" $ }}
                  key: {{ .key }}
            {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/fhir-subs/config.yaml
              subPath: config.yaml
              readOnly: true
            - name: secrets
              mountPath: /etc/fhir-subs/secrets
              readOnly: true
            {{- if .Values.tls.enabled }}
            - name: tls
              mountPath: {{ .Values.tls.mountPath }}
              readOnly: true
            {{- end }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.migrationInit.resources | nindent 12 }}
      {{- end }}
      containers:
        - name: fhir-subs
          image: {{ include "fhir-subs.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --config
            - /etc/fhir-subs/config.yaml
          env:
            {{- range .Values.secrets.env }}
            - name: {{ .name }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "fhir-subs.secretName" $ }}
                  key: {{ .key }}
            {{- end }}
          ports:
            - name: api
              containerPort: 8443
              protocol: TCP
            - name: probes
              containerPort: 8081
              protocol: TCP
            - name: mllp
              containerPort: 2575
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          {{- if .Values.probes.liveness.enabled }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: probes
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          {{- end }}
          {{- if .Values.probes.readiness.enabled }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: probes
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          {{- end }}
          {{- if .Values.probes.startup.enabled }}
          startupProbe:
            httpGet:
              path: /startup
              port: probes
            initialDelaySeconds: {{ .Values.probes.startup.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.startup.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.startup.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.startup.failureThreshold }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/fhir-subs/config.yaml
              subPath: config.yaml
              readOnly: true
            - name: secrets
              mountPath: /etc/fhir-subs/secrets
              readOnly: true
            {{- if .Values.tls.enabled }}
            - name: tls
              mountPath: {{ .Values.tls.mountPath }}
              readOnly: true
            {{- end }}
            - name: tmp
              mountPath: /tmp
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
        {{- with .Values.sidecars }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "fhir-subs.fullname" . }}-config
        - name: secrets
          secret:
            secretName: {{ include "fhir-subs.secretName" . }}
            defaultMode: 0400
        {{- if .Values.tls.enabled }}
        - name: tls
          secret:
            {{- if .Values.tls.existingSecret }}
            secretName: {{ .Values.tls.existingSecret }}
            {{- else }}
            secretName: {{ include "fhir-subs.fullname" . }}-tls
            {{- end }}
            defaultMode: 0400
        {{- end }}
        # readOnlyRootFilesystem requires writable /tmp via emptyDir.
        - name: tmp
          emptyDir: {}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: 60
