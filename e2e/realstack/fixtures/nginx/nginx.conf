# Default nginx config for the H1 realstack harness.
#
# Provides a passthrough TLS-terminated topology that H5 (CertFixture)
# tests overlay with a per-test cert + upstream config. The default
# baked-in config exposes :8443 with a healthz endpoint so the harness
# health probe in docker-compose succeeds even when no test is
# overlaying a cert config.

events {
    worker_connections 1024;
}

http {
    server {
        listen 8443;
        server_name _;

        location /healthz {
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        location / {
            return 503 "no upstream configured; tests must overlay nginx.conf\n";
            add_header Content-Type text/plain;
        }
    }
}
