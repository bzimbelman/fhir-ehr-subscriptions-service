# Prometheus config for the H1 realstack harness. Scrapes the prod
# fhir-subs binary's /metrics endpoint every 1s so tests can assert on
# fast metric deltas without long wall-clock waits.
#
# The bridge target is the prod-binary host:port the test process
# launched. Because the binary runs OUTSIDE docker (the harness
# launches it via exec.Cmd), we use host.docker.internal — supported
# on Docker Desktop (Mac/Windows) and via the explicit
# --add-host=host.docker.internal:host-gateway runtime flag the
# harness adds when starting Prometheus on Linux runners.

global:
  scrape_interval: 1s
  scrape_timeout: 1s
  evaluation_interval: 5s

scrape_configs:
  - job_name: fhir-subs
    metrics_path: /metrics
    static_configs:
      - targets:
          - host.docker.internal:8443
