# e2e/realstack/docker-compose.yml
#
# H1 RealStackHarness — the docker-compose stack for the production
# fhir-subs binary's e2e tests. Every service is a real-software
# dependency the binary actually talks to in production. No service is
# a Go-language fake.
#
# OP #344 (Realstack simplification A) deleted the prometheus,
# otel-collector, coredns, mitmproxy, nginx, and test-token-mint
# services. Their assertions live in proper unit/integration tests now:
#   - /metrics surfacing named counters: cmd/fhir-subs/wiring_observability_test.go
#   - tracing pipeline span emission: internal/api/handlers/tracing_test.go +
#     internal/infra/observability/tracing/tracing_test.go (in-memory exporter)
#   - SSRF / DNS-rebinding / IDN: internal/api/handlers/url_validator_test.go
#     (against the existing handlers.Resolver seam)
#   - STARTTLS-strip: internal/channel/email/email_test.go
#     (against the in-process testrelay that can opt out of advertising STARTTLS)
# See e2e/realstack/doc.go for the full simplification rationale.
#
# OP #345 (Realstack simplification B) merged the four legacy receiver
# fixtures (test-resthook-subscriber, test-ws-subscriber,
# test-mllp-control-plane, mailpit) into a single test-receivers
# service. One binary (cmd/test-receivers), one Dockerfile, one
# compose service exposing every receiver port concurrently:
#
#	:8090   rest-hook subscriber HTTP listener
#	:8091   websocket subscriber query API
#	:8093   MLLP control plane HTTP API (only when MLLP profile active)
#	:1025   SMTP receiver (real github.com/emersion/go-smtp server,
#	        replaces mailpit container)
#	:1080   SMTP query API (replaces mailpit's REST UI)
#
# The MLLP subsystem inside test-receivers stays under the "mllp"
# profile so non-MLLP test runs skip the FHIRSUBS_MLLP_TARGET wiring.
#
# Pinned image versions are deliberate: the harness binds the test
# matrix to a single reproducible upstream. Bump pins via a separate MR
# so a stack regression is bisectable.
#
# Each test boots its own copy of this stack with a unique compose
# project name (passed via `docker compose -p <project>`). Per-test
# project namespaces give isolated containers, networks, and volumes
# even when 50+ tests run concurrently.
#
# All services bind on 0 (random ephemeral host port) — Boot reads the
# rendered ports back via `docker compose port` so two concurrent stacks
# never collide on a host port. The compose file uses ${...} env-var
# substitution for image pins so the harness can override versions per
# test if a future story needs a multi-version matrix.

services:
  # PostgreSQL 16 — the database. migrate.Up runs against this.
  #
  # OP #346: gated behind the "external-local" compose profile so a
  # plain `docker compose up` brings up only the test receivers + the
  # prod binary. The realstack harness activates this profile when the
  # operator has NOT supplied FHIR_SUBS_TEST_DB_URL (and the matching
  # FHIR + OIDC env vars). When all three external-system env vars are
  # set, the harness skips the profile entirely and points the binary
  # at the externally-managed Postgres.
  postgres:
    profiles: ["external-local"]
    image: ${REALSTACK_POSTGRES_IMAGE:-postgres:16-alpine}
    environment:
      POSTGRES_USER: fhirsubs
      POSTGRES_PASSWORD: fhirsubs
      POSTGRES_DB: fhirsubs
    ports:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fhirsubs -d fhirsubs"]
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 5s

  # Keycloak 24 — real OIDC issuer. Exposes /realms/fhir-subs/protocol/
  # openid-connect/{token,certs}. Replaces every in-process
  # principalMiddleware and Bearer-test cheat in the legacy harness.
  #
  # `start-dev` is intentional: the test stack runs in dev mode for
  # speed (no production cluster bootstrap). The realm is provisioned
  # by the harness via Keycloak's REST API after the container reports
  # ready (see boot.go).
  #
  # OP #346: gated behind the "external-local" profile (see postgres
  # service above). FHIR_SUBS_TEST_OIDC_ISSUER_URL points the harness
  # at an externally-managed Keycloak when set.
  keycloak:
    profiles: ["external-local"]
    image: ${REALSTACK_KEYCLOAK_IMAGE:-quay.io/keycloak/keycloak:24.0}
    command: ["start-dev", "--http-port=8080"]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
    ports:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080 && printf 'GET /realms/master/.well-known/openid-configuration HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && grep -q '200 OK' <&3 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 30s

  # HAPI FHIR JPA Server — real R4/R4B/R5 reference FHIR server. The
  # FHIR scan runner and vendor change-feed runner point at this for
  # real Bundle hydration and resource lookup.
  #
  # OP #346: gated behind the "external-local" profile (see postgres
  # service above). FHIR_SUBS_TEST_FHIR_URL points the harness at an
  # externally-managed HAPI FHIR (or any conformant FHIR server) when
  # set.
  hapi-fhir:
    profiles: ["external-local"]
    image: ${REALSTACK_HAPI_IMAGE:-hapiproject/hapi:latest}
    environment:
      hapi.fhir.fhir_version: R4
      hapi.fhir.allow_external_references: "true"
      hapi.fhir.cors.allow_credentials: "false"
      hapi.fhir.openapi_enabled: "false"
      spring.main.allow-bean-definition-overriding: "true"
    ports:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080 && printf 'GET /fhir/metadata HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && grep -q '200 OK' <&3 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 30s

  # OP #345: mailpit, test-resthook-subscriber, test-ws-subscriber, and
  # test-mllp-control-plane (mllp profile) merged into the single
  # test-receivers service below.

  # Consolidated test-receivers fixture — built from cmd/test-receivers.
  # One binary exposes every receiver port concurrently:
  #
  #   :8090  rest-hook subscriber (HTTP /hook/{sub}, programmable control plane)
  #   :8091  websocket subscriber query API (/events, /reset, /healthz)
  #   :8093  MLLP control plane HTTP API (only with mllp profile +
  #          FHIRSUBS_MLLP_TARGET set; see launchMLLPControlPlane in boot.go)
  #   :1025  SMTP receiver (real github.com/emersion/go-smtp, replaces mailpit)
  #   :1080  SMTP query API (/messages, /reset, /healthz)
  #
  # The MLLP subsystem is gated by FHIRSUBS_MLLP_TARGET being non-empty;
  # the binary skips opening :8093 when it's empty so non-MLLP runs do
  # not depend on the host-gateway plumbing.
  test-receivers:
    build:
      context: ../..
      dockerfile: e2e/realstack/fixtures/test-receivers/Dockerfile
    image: fhir-subs-test-receivers:dev
    environment:
      FHIRSUBS_MLLP_TARGET: ${FHIRSUBS_MLLP_TARGET:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8090"
      - "8091"
      - "8093"
      - "1025"
      - "1080"
    healthcheck:
      test: ["CMD", "/usr/local/bin/test-receivers-healthcheck"]
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 5s

# OP #344: the otel-spans named volume was the file-exporter sink for
# the deleted otel-collector service; with both gone, this compose file
# no longer declares any named volumes.
