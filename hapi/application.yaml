# HAPI FHIR JPA server configuration for subscription-service.
#
# Mounted into the hapiproject/hapi container at /app/config/application.yaml
# (see deploy/docker/docker-compose.yml). Spring Boot picks this up
# automatically because /app is the working directory.
#
# Connection details (datasource URL, user, password) are intentionally NOT
# hard-coded here — they come from the SPRING_DATASOURCE_* env vars wired up
# in docker-compose.yml so the same config file works in Compose, Helm, and
# local dev.

server:
  port: 8080

management:
  endpoints:
    enabled-by-default: false
    web:
      exposure:
        include: 'health'
  endpoint:
    health:
      enabled: true
      probes:
        enabled: true

spring:
  main:
    allow-circular-references: true
  flyway:
    enabled: false
    baselineOnMigrate: true
    fail-on-missing-locations: false
  # datasource block stays minimal here. The url/username/password are pulled
  # from SPRING_DATASOURCE_* env (see docker-compose.yml). We only need to fix
  # the pool and pin the driver.
  datasource:
    driverClassName: org.postgresql.Driver
    max-active: 15
    hikari:
      maximum-pool-size: 10
  jpa:
    properties:
      hibernate.format_sql: false
      hibernate.show_sql: false
      hibernate.dialect: ca.uhn.fhir.jpa.model.dialect.HapiFhirPostgresDialect
      hibernate.hbm2ddl.auto: update
      hibernate.search.enabled: false

hapi:
  fhir:
    fhir_version: R4
    openapi_enabled: true

    # Enable HAPI partitioning structurally so the Postgres schema gets a
    # `partition_id` column on every resource table — whether or not
    # multi-tenancy is actually in use at runtime. This is the key
    # cheap-up-front / expensive-to-retrofit knob (see ticket #369 and
    # docs/architecture.md "Multi-tenancy").
    #
    # The runtime behaviour is owned by
    # `subscription-service.multitenancy.mode` (DISABLED | ENABLED), not
    # by this block:
    #
    #   - DISABLED (default): TenantPartitionInterceptor returns the DEFAULT
    #     partition for every request. URLs look like /fhir/Patient/123.
    #     Subscribers see a single-tenant server.
    #   - ENABLED: TenantPartitionInterceptor reads the `tenant` claim from
    #     the validated JWT and scopes every operation to a partition named
    #     after the claim.
    #
    # We also unregister the upstream HAPI starter's URL-based tenant
    # interceptor + strategy at boot (see MultitenancyAutoConfiguration),
    # so the FHIR base URL shape is identical in both modes.
    partitioning:
      partitioning_include_in_search_hashes: false
      allow_references_across_partitions: false
      conditional_create_duplicate_identifiers_enabled: false

    # Don't auto-install transitive IG dependencies. US Core 7.0.0 lists
    # `hl7.fhir.uv.extensions@5.1.0-snapshot1` as a dep, which declares
    # fhirVersions: ["4.3.0"] (R4B) and HAPI's PackageInstaller refuses it
    # against this R4 (4.0.1) server. We don't need that transitive package
    # for the profiles US Core actually uses, so skip it.
    install_transitive_ig_dependencies: false

    # Enable the legacy criteria-based REST-hook + WebSocket subscription
    # channels. The R5 Subscriptions Backport IG (loaded below) adds the
    # topic-based model on top of these.
    subscription:
      resthook_enabled: true
      websocket_enabled: true

    # IG packages to install at boot. The hapi-fhir-jpaserver-starter image
    # accepts either a registry coordinate (name + version) or a packageUrl
    # pointing at a tarball. We use packageUrl pointing at the bind-mounted
    # files in /app/igs so the deploy works air-gapped and so the exact
    # bytes loaded are pinned by the file in this repo.
    #
    # Files are placed in hapi/igs/ by scripts/fetch-igs.sh; see hapi/igs/README.md.
    implementationguides:
      us_core:
        name: hl7.fhir.us.core
        version: 7.0.0
        packageUrl: file:///app/igs/hl7.fhir.us.core-7.0.0.tgz
        reloadExisting: false
        installMode: STORE_AND_INSTALL
      # The unsuffixed `hl7.fhir.uv.subscriptions-backport@1.1.0` package
      # declares fhirVersions: ["4.3.0"] (R4B) and won't install on a 4.0.1
      # server. The R4 variant — same content, different metadata —
      # installs cleanly.
      subscriptions_backport:
        name: hl7.fhir.uv.subscriptions-backport.r4
        version: 1.1.0
        packageUrl: file:///app/igs/hl7.fhir.uv.subscriptions-backport.r4-1.1.0.tgz
        reloadExisting: false
        installMode: STORE_AND_INSTALL

    cors:
      allow_Credentials: true
      allowed_origin:
        - '*'

    tester:
      home:
        name: subscription-service (local)
        server_address: 'http://localhost:8080/fhir'
        refuse_to_fetch_third_party_urls: false
        fhir_version: R4

    logical_urls:
      - http://terminology.hl7.org/*
      - https://terminology.hl7.org/*
      - http://snomed.info/*
      - https://snomed.info/*
      - http://unitsofmeasure.org/*
      - https://unitsofmeasure.org/*
      - http://loinc.org/*
      - https://loinc.org/*

# Multi-tenancy runtime config (ticket #369). The env-var-driven values resolve
# via Spring's standard property placeholders below — that's necessary because
# the short env var `SUBSCRIPTION_SERVICE_MULTITENANCY` itself maps to the YAML
# *prefix*, not to a `.mode` leaf. Spelling out the binding here gives us the
# friendly env-var name from architecture.md while still using `mode` as the
# real property the @ConfigurationProperties bean reads.
subscription-service:
  multitenancy:
    mode: ${SUBSCRIPTION_SERVICE_MULTITENANCY:disabled}
    tenant-claim: ${SUBSCRIPTION_SERVICE_MULTITENANCY_TENANT_CLAIM:tenant}
    test-mode: ${SUBSCRIPTION_SERVICE_MULTITENANCY_TEST_MODE:false}

  # FHIR AuditEvent generator (ticket #391, Epic #387). Every interesting REST
  # operation (writes by default; reads/searches opt-in) produces an AuditEvent
  # resource persisted back into HAPI itself — so the audit trail is queryable
  # via `GET /fhir/AuditEvent`. See hapi/auth/.../audit/AuditEventInterceptor.java
  # for the full design.
  #
  # `enabled` is the master toggle. `capture-reads` / `capture-search` are off
  # by default because read traffic dominates write traffic; flip them on per
  # deployment when compliance requires it. `retention-days` is informational
  # only — purging old AuditEvent rows is a separate scheduled job (not yet
  # implemented).
  audit:
    enabled: ${SUBSCRIPTION_SERVICE_AUDIT_ENABLED:true}
    capture-reads: ${SUBSCRIPTION_SERVICE_AUDIT_CAPTURE_READS:false}
    capture-search: ${SUBSCRIPTION_SERVICE_AUDIT_CAPTURE_SEARCH:false}
    retention-days: ${SUBSCRIPTION_SERVICE_AUDIT_RETENTION_DAYS:365}
