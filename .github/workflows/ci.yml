name: ci

# PR / push gate: build, unit tests with race detector, lint, gofmt, go vet.
# Integration and e2e suites live in integration.yml so this workflow stays
# fast and the default PR experience is "green in a few minutes".

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  GO_VERSION: '1.22'

jobs:
  gofmt:
    name: gofmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: gofmt -l (must be empty)
        run: |
          out="$(gofmt -l .)"
          if [ -n "$out" ]; then
            echo "::error::gofmt found unformatted files:"
            echo "$out"
            exit 1
          fi

  vet:
    name: go vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - run: go mod download
      - run: go vet ./...

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      # Story #283: golangci-lint version pinned to the version used to
      # generate the lint-debt inventory. Bumping requires re-running the
      # inventory and either fixing or justifying any new findings.
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v1.62.0
          args: --timeout=5m

  nolint-explanation:
    name: //nolint must have explanation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Story #283: every //nolint must justify itself, e.g.
      #   //nolint:gosec // parseTLSMinVersion always returns >= TLS 1.2
      # A bare //nolint or //nolint:rule with no trailing "// reason" fails CI.
      - name: scan for unexplained //nolint directives
        run: |
          set -uo pipefail
          # A valid //nolint directive must be followed by "// <non-empty reason>".
          # Examples:
          #   //nolint:gosec // parseTLSMinVersion always returns >= TLS 1.2  (valid)
          #   //nolint:gosec                                                  (invalid: no reason)
          #   //nolint:gosec //                                               (invalid: empty reason)
          #
          # Strategy: list every //nolint occurrence, then drop the ones that
          # have a non-empty trailing "// ..." reason. Anything left is bad.
          all_nolint=$(grep -REn --include='*.go' '//nolint' . || true)
          if [ -z "$all_nolint" ]; then
            echo "No //nolint directives in the tree."
            exit 0
          fi
          # Reasoned: //nolint(:rules)?<whitespace>//<whitespace><at least one non-whitespace char>
          # The trailing "[^[:space:]].*" demands at least one visible character after the slashes.
          violations=$(printf '%s\n' "$all_nolint" \
            | grep -Ev '//nolint(:[a-zA-Z0-9_,-]+)?[[:space:]]+//[[:space:]]*[^[:space:]].*$' \
            || true)
          if [ -n "$violations" ]; then
            echo "::error::Unexplained //nolint directives found. Add '// <reason>' after the directive."
            printf '%s\n' "$violations"
            exit 1
          fi
          echo "All //nolint directives carry an explanation."

  prod-stub-lint:
    name: prod-stub-lint (no test-time stubs in cmd/, internal/)
    runs-on: ubuntu-latest
    # Story #264 (H9 ProductionStubLint): surfaces test-time stubs that
    # leaked into production code. Runs on every PR so findings are
    # visible; intentionally NOT yet in build/docker `needs:` because
    # W1 and the wiring stories own removing the current findings.
    # Once the count reaches zero, promote to a hard gate by adding
    # `prod-stub-lint` to `needs:` for `build` and `docker`.
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # F84 needs git blame history
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: go run ./tools/prod-stub-lint
        run: go run ./tools/prod-stub-lint
        continue-on-error: true

  test:
    name: unit tests (race)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - run: go mod download
      - name: go test -race -count=1
        run: go test -race -count=1 -coverprofile=cover.out -covermode=atomic ./...
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: cover.out
          retention-days: 14
      # OP #128: enforce the per-package coverage floor declared in
      # .coverage-thresholds.json. Failures list the offending packages
      # and exit non-zero so the PR cannot merge below threshold.
      - name: enforce coverage threshold
        run: go run ./tools/covergate -profile cover.out -thresholds .coverage-thresholds.json

  govulncheck:
    # OP #131: govulncheck closes the vulnerability gap CodeQL leaves
    # open (CodeQL is SAST-only and ignores known-CVE deps in
    # go.sum).
    #
    # Phase 1 (this PR): the job runs and surfaces the dependency
    # vulnerability inventory. continue-on-error keeps it green while
    # dependabot (also wired up in this PR via .github/dependabot.yml)
    # ages out the affected modules. The on-main scan in nightly.yml
    # is the same job without continue-on-error so a regression after
    # the inventory is cleaned cannot silently re-enter the tree.
    #
    # Phase 2 (follow-on; tracked separately in OP #131): once the
    # weekly dependabot PRs land go1.23.7+ and clean otel/golang.org/x
    # deps, drop continue-on-error so govulncheck blocks PR merge —
    # which is the eventual AC.
    name: govulncheck
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - run: go mod download
      - name: install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: govulncheck ./...
        run: govulncheck ./...

  build:
    name: build
    runs-on: ubuntu-latest
    needs: [gofmt, vet, lint, nolint-explanation, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - run: go build -trimpath ./cmd/fhir-subs

  docker:
    name: docker build
    runs-on: ubuntu-latest
    needs: [gofmt, vet, lint, nolint-explanation, test]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: fhir-subs:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # OP #210: VERSION + COMMIT must be embedded so the image's
          # --version banner is non-empty for the smoke step below.
          build-args: |
            VERSION=ci-${{ github.sha }}
            COMMIT=${{ github.sha }}

      # OP #135: smoke-run the built image. Catches entrypoint, ldflag,
      # and probe-surface regressions that an unrun image would hide.
      - name: smoke — docker run --version
        run: |
          out="$(docker run --rm fhir-subs:ci --version)"
          echo "version: $out"
          if [ -z "$out" ]; then
            echo "::error::--version produced empty output"
            exit 1
          fi
          # AC: assert non-empty version (ldflag wired).
          if printf '%s' "$out" | grep -qE 'commit dev'; then
            echo "::error::image was built without a commit ldflag (still 'commit dev')"
            exit 1
          fi
      - name: smoke — docker run --check-config
        run: |
          docker run --rm \
            -v "$PWD/.github/ci/smoke-config.yaml:/etc/fhir-subs/config.yaml:ro" \
            fhir-subs:ci \
            --check-config \
            --config /etc/fhir-subs/config.yaml
      - name: smoke — /healthz probe (10s probe-only run)
        run: |
          # Boot the binary in probe-only mode, hit /healthz on the
          # probe listener, then send SIGTERM. The container is host-
          # networked so the probe port is reachable from the runner.
          cid=$(docker run -d --rm --network host \
            -v "$PWD/.github/ci/smoke-config.yaml:/etc/fhir-subs/config.yaml:ro" \
            fhir-subs:ci \
            --config /etc/fhir-subs/config.yaml)
          trap 'docker stop "$cid" >/dev/null 2>&1 || true' EXIT
          # /healthz is on probe_bind 127.0.0.1:18081 per the smoke fixture.
          ok=0
          for _ in $(seq 1 50); do
            if curl -fsS --max-time 1 http://127.0.0.1:18081/healthz >/dev/null; then
              ok=1
              break
            fi
            sleep 0.2
          done
          if [ "$ok" -ne 1 ]; then
            echo "::error::/healthz never returned 200 within 10s"
            docker logs "$cid" || true
            exit 1
          fi
          echo "/healthz OK"
