name: release

# Triggered by semver tags (vX.Y.Z). Cuts cross-platform binaries and pushes a
# multi-arch container image to GHCR. Tag the commit on main; this workflow
# does not run on branch pushes.

on:
  push:
    tags: ['v[0-9]+.[0-9]+.[0-9]+', 'v[0-9]+.[0-9]+.[0-9]+-*']

# OP #136: workflow-level permissions are the minimum needed by the
# release + binaries jobs. id-token: write is scoped down to the image
# job only (the single legitimate consumer — cosign keyless OIDC
# signing). Granting it workflow-wide is unnecessary attack surface.
permissions:
  contents: write
  packages: write

env:
  # OP #134: pinned exactly. See ci.yml for the rationale.
  GO_VERSION: '1.22.10'
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  binaries:
    name: build binaries
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
          VERSION: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
        run: |
          out="fhir-subs-${VERSION}-${GOOS}-${GOARCH}"
          mkdir -p dist
          # OP #209: -X main.Version (capital V) matches the variable
          # declared in cmd/fhir-subs/version.go. The previous lowercase
          # form was a no-op so released binaries reported version=dev.
          go build \
            -trimpath \
            -ldflags="-s -w -X main.Version=${VERSION} -X main.Commit=${COMMIT}" \
            -o "dist/${out}" \
            ./cmd/fhir-subs
          (cd dist && sha256sum "${out}" > "${out}.sha256")
      - name: assert --version reports the tag
        # OP #209 AC: a CI check runs the built binary with --version
        # and asserts the output matches the tag. Cross-compiled
        # binaries can only execute on a runner that matches their
        # target, so run this gate only on the linux/amd64 matrix
        # entry (ubuntu-latest is amd64 today).
        if: matrix.goos == 'linux' && matrix.goarch == 'amd64'
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          out="dist/fhir-subs-${VERSION}-linux-amd64"
          got="$(${out} --version)"
          case "${got}" in
            *"${VERSION}"*) echo "ok: ${got}" ;;
            *) echo "FAIL: expected ${VERSION} in --version output, got: ${got}" >&2; exit 1 ;;
          esac
      - uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          retention-days: 7
          if-no-files-found: error

  image:
    name: build & push image
    runs-on: ubuntu-latest
    # OP #136: id-token: write is scoped here, not at the workflow
    # level, because cosign keyless OIDC signing is the only consumer.
    # OP #133-style alerting does not apply on releases.
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      # OP #129: install cosign so the post-push step can sign the
      # released image. Pin to a specific cosign version so signature
      # tooling on the supply-chain side stays predictable.
      - name: install cosign
        uses: sigstore/cosign-installer@v3.7.0
        with:
          cosign-release: 'v2.4.1'
      - name: login to ghcr
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}
      - name: build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # OP #210: pass VERSION + COMMIT into the image build so the
          # baked-in `main.Version` / `main.Commit` track the tag and
          # SHA instead of the "dev" defaults.
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true
      # OP #129: sign every tag the meta step produced using cosign
      # keyless (Sigstore Fulcio + Rekor). The digest comes from
      # build-push-action's `digest` output so we sign exactly the
      # manifest list that was just pushed, not whatever the tag
      # resolves to at sign time.
      - name: cosign sign image
        env:
          COSIGN_EXPERIMENTAL: '1'
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail
          if [ -z "${DIGEST}" ]; then
            echo "::error::build step produced no digest; nothing to sign"
            exit 1
          fi
          # `cosign sign` accepts <name>@<digest>; iterate over every
          # repository:tag the metadata step emitted so all alias tags
          # (semver, latest) point at the same signed manifest.
          while IFS= read -r tag; do
            [ -n "${tag}" ] || continue
            ref="${tag%:*}@${DIGEST}"
            echo "cosign sign ${ref}"
            cosign sign --yes "${ref}"
          done <<<"${TAGS}"

  release:
    name: github release
    needs: [binaries, image]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: bin-*
          merge-multiple: true
      - name: create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/fhir-subs-*
