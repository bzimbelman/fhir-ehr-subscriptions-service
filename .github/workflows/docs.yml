name: docs

# OP #137: `mkdocs build --strict` MUST run on every PR so broken
# links, missing nav entries, and template errors are caught before
# merge. The deploy job stays gated to push-to-main so PRs (especially
# from forks) don't try to deploy without secrets.

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'requirements-docs.txt'
      - '.github/workflows/docs.yml'
  pull_request:
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'requirements-docs.txt'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-docs.txt
      - run: pip install -r requirements-docs.txt
      - run: mkdocs build --strict
      - uses: actions/configure-pages@v5
        if: github.event_name == 'push'
      - uses: actions/upload-pages-artifact@v5
        if: github.event_name == 'push'
        with:
          path: site

  deploy:
    needs: build
    # OP #137: deploy runs on push-to-main only. PR builds (and
    # workflow_dispatch from non-main refs) verify --strict but do not
    # deploy because they lack the pages id-token.
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
