spring:
  application:
    # Referenced by IPF's ATNA auto-config (auditMetadataProvider). Required.
    name: subscription-service-interface-engine
  # ---------------------------------------------------------------------------
  # Datasource for the interface-engine's own Postgres database (Epic #378).
  # SEPARATE from HAPI's database — separate DB name, separate user, separate
  # Flyway migration history — so HAPI schema changes can't break us and
  # vice versa. In Compose / k8s, both DBs live on the same Postgres server
  # (one container) for v1; can be split later without app changes.
  #
  # The IPF database is optional at the JVM level: when the
  # `subscription-service.ipf-db.enabled` toggle is `false` (set by unit
  # tests via @TestPropertySource), Spring Boot's datasource autoconfig is
  # excluded entirely and tests don't need a Postgres available. Production
  # always runs with this on.
  # ---------------------------------------------------------------------------
  datasource:
    url: ${IPF_DB_URL:jdbc:postgresql://hapi-db:5432/ipf}
    username: ${IPF_DB_USER:ipf}
    password: ${IPF_DB_PASSWORD:ipf}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 10000
  jpa:
    open-in-view: false
    hibernate:
      # Flyway owns the schema; Hibernate must not touch it.
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true

server:
  # HAPI FHIR's bundled servers use 8080. Pick 8090 to avoid conflicts in
  # docker-compose where everything binds to the same host network.
  port: 8090

management:
  endpoints:
    web:
      exposure:
        # Spring Boot 3.x exposes only /health by default. We expose:
        #   - health: liveness/readiness probes (k8s, Docker)
        #   - info: build metadata
        #   - metrics: queryable Micrometer metric names (debugging)
        #   - prometheus: Prometheus exposition format for scraping (#389)
        include: health,info,metrics,prometheus
  endpoint:
    health:
      # ALWAYS show details on /actuator/health so the per-indicator
      # status (matchbox, hapi, dlqBacklog, db, …) is visible to the
      # Kubernetes probe consumers and to operators curling the endpoint
      # for triage. The endpoint is on the same listener as the rest of
      # the app — if you don't want clients seeing details, gate the
      # actuator path at the ingress / NetworkPolicy layer rather than
      # by stripping detail here. Ticket #393.
      show-details: always
      probes:
        # Exposes /actuator/health/liveness and /actuator/health/readiness
        # as separate endpoints with their own indicator groupings below.
        enabled: true
      group:
        # Liveness probe (Kubernetes will RESTART a DOWN pod). Only
        # JVM-internal stuff: if Matchbox is unreachable, restarting our
        # pod doesn't help — Matchbox itself needs to come back. We
        # include `ping` (always UP — proves the actuator endpoint is
        # responsive) and `db` (a `SELECT 1` against the local Postgres
        # via Spring Boot's built-in DataSourceHealthIndicator) so a
        # totally wedged JVM or a corrupt local DB connection pool DOES
        # trigger restart. Ticket #393.
        liveness:
          include: ping, db
        # Readiness probe (Kubernetes will REMOVE a DOWN pod from
        # Service endpoints but leave it running). Full health: if a
        # downstream is unreachable, take this pod out of rotation so
        # incoming traffic isn't sent to a pod that can't complete work.
        # The `dlqBacklog` indicator NEVER returns DOWN (only DEGRADED),
        # so including it here doesn't cause readiness flapping when
        # operators leave DEAD_LETTER rows uncleared — it just surfaces
        # the count in the response body for monitoring.
        readiness:
          include: ping, db, matchbox, hapi, dlqBacklog
    # Spring Boot 3.4+ added an endpoint-level "access" gate that defaults
    # to `read_only` for most endpoints — EXCEPT the prometheus endpoint,
    # which defaults to `none` (registered but not reachable). Without
    # this `read_only` override the /actuator/prometheus path 404s even
    # when `management.endpoints.web.exposure.include` lists `prometheus`.
    # Required for ticket #389.
    prometheus:
      access: read_only
  prometheus:
    # Spring Boot 3.5 added @ConditionalOnEnabledMetricsExport to the
    # Prometheus auto-configuration; explicit enable required so the
    # PrometheusMeterRegistry bean is created even though the registry
    # JAR is on the classpath. Default is true at the framework level but
    # we set it here so the contract is documented + local-dev overrides
    # have one obvious knob to flip when debugging.
    metrics:
      export:
        enabled: true
  # Prometheus registry configuration (Epic #387, ticket #389). Histograms
  # without explicit SLO buckets ship only count/sum/max, which is fine for
  # alerts on rate / p99-vs-baseline but useless for cross-percentile
  # comparison. Turn on percentile histograms globally for the custom
  # timers below so query-time percentile (`histogram_quantile`) works in
  # Prometheus without a separate "summary" type. Cost is modest — one
  # bucket counter per default-bucket per timer.
  metrics:
    distribution:
      percentiles-histogram:
        interface_engine.transform.duration: true
        interface_engine.hapi_post.duration: true
        interface_engine.received_to_delivered: true
    tags:
      # Static application tag on every metric so a single Prometheus can
      # scrape multiple services and disambiguate via `application="..."`.
      # Matches the convention HAPI's own Micrometer setup uses.
      application: ${spring.application.name}

logging:
  level:
    root: INFO
    com.bzonfhir.subscriptionservice: INFO
    org.apache.camel: INFO
    org.openehealth.ipf: INFO
  # JSON log layout via Logback (Epic #387, ticket #388). The actual encoder
  # is configured in `logback-spring.xml` on the classpath; Spring Boot
  # picks that file up automatically when it's present. We keep the
  # `logging.level.*` block here so SPRING_PROFILES_ACTIVE, env-var
  # overrides, and the rest of Spring Boot's logging-property handling
  # still work — only the appender/encoder is replaced.
  #
  # To run with pretty-printed logs locally: SPRING_PROFILES_ACTIVE=dev.
  # The `dev` profile is wired in logback-spring.xml.

# ---------------------------------------------------------------------------
# OpenTelemetry distributed tracing (Epic #387, ticket #394).
#
# The OTel SDK reads `OTEL_*` env vars on its own via
# AutoConfiguredOpenTelemetrySdk. We ALSO expose the same knobs here as
# Spring properties (`otel.*`) so they can be overridden via
# @TestPropertySource and application-${profile}.yaml. The OtelConfig
# bean bridges the two via addPropertiesCustomizer.
#
# Default is OFF (no spans, no exporter, no overhead). Operator flips
# OTEL_SDK_DISABLED=false (or otel.sdk.disabled=false) and sets an
# endpoint to turn tracing on.
#
# Relevant knobs:
#   otel.sdk.disabled (default true here — explicit OFF)
#   otel.exporter.otlp.endpoint
#   otel.service.name (defaulted to subscription-service-interface-engine in OtelConfig)
#   otel.resource.attributes (e.g. deployment.environment=prod)
# ---------------------------------------------------------------------------
otel:
  sdk:
    disabled: ${OTEL_SDK_DISABLED:true}
  exporter:
    otlp:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:}
  service:
    name: ${OTEL_SERVICE_NAME:subscription-service-interface-engine}
  resource:
    attributes: ${OTEL_RESOURCE_ATTRIBUTES:}

subscription-service:
  # Observability config (Epic #387).
  # ticket #389: Prometheus metrics. The custom-metrics emitters are unconditional
  # (they're cheap and the registry handles unused metrics gracefully), but the
  # DlqSizeGauge's scheduled poll IS conditional — operators in non-Prometheus
  # environments can flip `enabled` off to skip the DB SELECT every poll
  # interval. Default ON.
  observability:
    metrics:
      enabled: ${SUB_SERVICE_METRICS_ENABLED:true}
      # DlqSizeGauge poll interval (ms). Default 30s — chart scrapes at 30s
      # by default so one poll per scrape is the right rhythm. Lower to 5s
      # for high-frequency dashboards; raise to 60s to reduce DB load.
      dlq-poll-ms: ${SUB_SERVICE_METRICS_DLQ_POLL_MS:30000}
      # Initial delay before the first DlqSizeGauge poll. Kept short so a
      # freshly-started pod reports a real value within ~1s of readiness.
      dlq-poll-initial-ms: ${SUB_SERVICE_METRICS_DLQ_POLL_INITIAL_MS:1000}
  # MLLP listener port. Override with MLLP_PORT env var. 2575 is the de-facto
  # default for HL7v2 MLLP in the IPF / hapi-test-panel community.
  mllp:
    port: ${MLLP_PORT:2575}
  # Downstream services. Wired into the route in ticket #361.
  hapi:
    base-url: ${HAPI_BASE:http://hapi:8080/fhir}
    # IGenericClient socket/read timeout for the HAPI transaction POST.
    timeout-ms: ${HAPI_TIMEOUT_MS:30000}
  matchbox:
    base-url: ${MATCHBOX_BASE:http://matchbox:8080/matchboxv3/fhir}
    # HTTP timeouts for the $transform call. Applied via Camel's http
    # component as connect-timeout / response-timeout. v2 → FHIR transforms
    # are usually sub-second but matchbox loads IG packages lazily on the
    # first hit, which can take 10+s on a cold container.
    timeout-ms: ${MATCHBOX_TIMEOUT_MS:30000}
    # StructureMap canonical URL for the ADT^A01 → Bundle map. Configurable so
    # operators can swap in a project-specific map without rebuilding the IPF
    # image. NOTE: the public v2-to-FHIR IG v1.0.0 ships ConceptMaps for the
    # message-level mapping, not executable StructureMaps; this URL is the
    # *expected* canonical URL once matchbox-loadable StructureMaps are
    # published or added under matchbox/maps/. See docs/architecture.md
    # "Mapping strategy" and matchbox/README.md.
    structuremap:
      adt-a01: ${MATCHBOX_SM_ADT_A01:http://hl7.org/fhir/uv/v2mappings/StructureMap/ADT_A01}
  # ---------------------------------------------------------------------------
  # Async worker (Epic #378, ticket #382). The worker polls `ingested_messages`
  # for RECEIVED (or retry-ready FAILED) rows, drives the matchbox transform,
  # POSTs the resulting Bundle to HAPI, and updates the row's status.
  #
  # Implementation note: uses Spring's `@Scheduled` rather than a Camel
  # `timer:` route. The IngestedMessageWorker class comment explains the
  # tradeoffs; the short version is that this whole story is one bounded
  # piece of work driven by SELECT … FOR UPDATE SKIP LOCKED, and plain
  # Spring scheduling keeps the moving parts minimal + the test harness
  # is just @SpringBootTest + Awaitility (no Camel AdviceWith needed).
  #
  # `enabled: false` turns the @Scheduled loop off entirely — used by the
  # existing IngestRoutesTest / AdminMessagesControllerTest so they don't
  # have a worker chewing on their seed rows mid-test.
  # ---------------------------------------------------------------------------
  worker:
    enabled: ${IPF_WORKER_ENABLED:true}
    poll-interval-ms: ${IPF_WORKER_POLL_MS:1000}
    batch-size: ${IPF_WORKER_BATCH_SIZE:10}
    # Rows stuck in TRANSFORMING for longer than this on startup are
    # considered orphans from a previous JVM that died mid-process and
    # are reset to FAILED so the worker retries them on the next poll.
    transforming-stale-seconds: ${IPF_WORKER_TRANSFORMING_STALE_SECONDS:60}
    # -------------------------------------------------------------------------
    # Retry policy (Epic #378, ticket #383). When the matchbox transform or
    # HAPI POST fails for a row, the worker schedules a retry with
    # exponential backoff: `next_attempt_at = now() + min(base * factor^(N-1), max)`
    # for the new attempt count N. After max-attempts failures the row
    # transitions to DEAD_LETTER (next_attempt_at = NULL) and one log line
    # at `dlq-log-level` is emitted. The admin retry endpoint (#384) resets
    # the row's attempt_count to 0 and clears next_attempt_at, so a retried
    # message starts the backoff sequence from scratch.
    #
    # Defaults: 1s, 2s, 4s, 8s, 16s (capped at 5 min) before DLQ at attempt 5.
    # -------------------------------------------------------------------------
    retry:
      max-attempts: ${IPF_MAX_ATTEMPTS:5}
      backoff-base-ms: ${IPF_BACKOFF_BASE_MS:1000}
      backoff-max-ms: ${IPF_BACKOFF_MAX_MS:300000}
      backoff-factor: ${IPF_BACKOFF_FACTOR:2.0}
      dlq-log-level: ${IPF_DLQ_LOG_LEVEL:WARN}

# Camel autoconfig.
# ---------------------------------------------------------------------------
# Admin REST API (Epic #378, ticket #384). The bearer token gates the
# `/admin/**` endpoints. When empty/unset the endpoints are unauthenticated
# (dev convenience); a WARN is logged at startup. Override per-environment.
# ---------------------------------------------------------------------------
ipf:
  admin:
    auth-token: ${IPF_ADMIN_AUTH_TOKEN:}

camel:
  springboot:
    name: subscription-ingest
    main-run-controller: true
  component:
    # camel-http component-wide timeouts for the Matchbox $transform call.
    # We can't append these to the toD URI in IngestRoutes because the
    # dynamic URL already includes a `?source=…` query string and Camel
    # would treat extra options as part of that downstream query string
    # rather than as endpoint options. Setting them here applies them to
    # every camel-http producer in the app, which is fine for v1 — we only
    # call one external HTTP backend (matchbox). If/when we add a second
    # HTTP target with different timeouts, switch this app to a named
    # component (e.g. `matchbox-http`) and configure each separately.
    http:
      connect-timeout: ${MATCHBOX_TIMEOUT_MS:30000}
      connection-request-timeout: ${MATCHBOX_TIMEOUT_MS:30000}
      response-timeout: ${MATCHBOX_TIMEOUT_MS:30000}
      so-timeout: ${MATCHBOX_TIMEOUT_MS:30000}
