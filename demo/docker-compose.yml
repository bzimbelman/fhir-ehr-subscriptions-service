# demo/docker-compose.yml
#
# One-command demo spin-up for the fhir-ehr-subscriptions-service bridge.
# Closes Demo gap-5 from docs/subscription-sidecar-demo.md.
#
# Brings up:
#   - postgres        — Postgres 16 (the bridge's only hard dependency)
#   - bridge          — the fhir-subs binary, built from this repo's Dockerfile
#                       (../Dockerfile), running with demo/config.yaml.
#   - demo-subscriber — long-running rest-hook receiver (cmd/demo-subscriber)
#                       that POSTs a Subscription to the bridge and exposes
#                       /journal on host:9090 for inspection.  OP #154 added
#                       this so the documented walkthrough actually delivers.
#   - demo-publisher  — one-shot HL7 v2 publisher (cmd/demo-publisher) that
#                       walks scenarios/labs.yaml against the bridge's MLLP
#                       listener.  Profile-gated so `compose up` does not
#                       run it automatically; invoke via
#                       `docker compose run --rm demo-publisher`.
#
# The topics catalog volume is mounted from ./topics so the demo
# SubscriptionTopic JSON files seeded by Demo gap-6 are picked up at
# startup. The bridge re-loads on SIGHUP (B-35).
#
# Run from this directory:
#   docker compose up -d
#   curl -fsS http://localhost:8443/readyz   # 200 within ~60s
#   docker compose run --rm demo-publisher    # send the bundled scenario
#
# Tear down:
#   docker compose down -v
#
# Apple Silicon + amd64: the upstream postgres:16-alpine image is multi-arch
# and the bridge image is built from source via ../Dockerfile, so it picks
# up the host platform without a `platform:` override.

services:
  postgres:
    image: postgres:16-alpine
    container_name: fhir-subs-demo-postgres
    environment:
      POSTGRES_USER: fhirsubs
      POSTGRES_PASSWORD: fhirsubs
      POSTGRES_DB: fhirsubs
    ports:
      - "5433:5432"   # host:container — 5433 to avoid colliding with a host Postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fhirsubs -d fhirsubs"]
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 5s

  bridge:
    # Reuse the existing production Dockerfile at the repo root — no second
    # image is built. Compose only adds runtime context (config + topics).
    build:
      context: ..
      dockerfile: Dockerfile
    image: fhir-subs:demo
    container_name: fhir-subs-demo-bridge
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - "--config"
      - "/etc/fhir-subs/config.yaml"
    environment:
      # The config file references neither env vars nor secrets; everything
      # the demo needs is baked into config.yaml. This block exists so an
      # operator can pass GOMAXPROCS / GODEBUG without editing the file.
      GOMAXPROCS: "2"
    volumes:
      # Demo config — points the bridge at the postgres service hostname,
      # binds plaintext on :8443, opens an MLLP listener on :2575, and
      # supplies a pinned demo AES-GCM codec key.
      - ./config.yaml:/etc/fhir-subs/config.yaml:ro
      # Topic catalog volume. Mirrors the SubscriptionTopic JSON seeded
      # by Demo gap-6 (#83). The bridge hot-reloads on SIGHUP (B-35).
      - ./topics:/etc/fhir-subs/topics:ro
    ports:
      # Subscriptions API (insecure HTTP for demo only).
      - "8443:8443"
      # Probe listener (/readyz, /healthz, /metrics). The bridge
      # binds probes on a separate port from the FHIR API per
      # cmd/fhir-subs/config.go ProbeBind (default :8081); without
      # this mapping the host cannot poll /readyz to gate the demo.
      - "8081:8081"
      # MLLP listener — demo-publisher (Demo gap-3) targets this port.
      - "2575:2575"
    # No in-container healthcheck: the bridge runs on
    # gcr.io/distroless/static-debian12:nonroot, which has no shell, no
    # curl, and no wget. Operators verify readiness from the host with
    # `curl http://localhost:8081/readyz` — see README-compose.md.
    restart: unless-stopped

  # demo-subscriber — long-running rest-hook receiver. Reuses the same
  # image as the bridge (Dockerfile builds /demo-subscriber alongside
  # /fhir-subs after OP #154). Listens on :9090 inside the container,
  # advertises `http://demo-subscriber:9090` so the bridge can route to
  # it across the compose network. The bridge's URLValidator
  # whitelists this hostname via auth.allow_subscriber_hosts in
  # config.yaml — without that the rest-hook delivery would be
  # rejected as private-IP SSRF.
  demo-subscriber:
    image: fhir-subs:demo
    container_name: fhir-subs-demo-subscriber
    depends_on:
      bridge:
        condition: service_started
    entrypoint: ["/demo-subscriber"]
    command:
      - "--bridge"
      - "http://bridge:8443"
      - "--listen"
      - "0.0.0.0:9090"
      - "--advertise"
      - "http://demo-subscriber:9090"
      - "--topic"
      - "http://demo.org/topics/lab-results"
      - "--filter"
      - "patient=ABC123"
      - "--token"
      - "demo-token"
      # The bridge runs in dev-bypass auth mode (no audience set ->
      # devPrincipalMiddleware mounted). That middleware only attaches
      # a Principal when X-Client-Id is present; without it the
      # subscribe POST is 401 unauthenticated. Pass a client-id so the
      # demo-subscriber's request looks like an authorised client.
      - "--client-id"
      - "demo-subscriber"
      - "--pretty=false"
      # Wait up to 120s for bridge /readyz to flip to 2xx before
      # subscribing. The bridge boots Postgres + migrations + the
      # observability stack first, so the Subscription API can take
      # ~10s to be reachable in a cold compose stack.
      - "--wait-for-readyz=120s"
      # Probes are served on the separate ProbeBind port (default
      # :8081), not the FHIR API on :8443.
      - "--readyz-url=http://bridge:8081/readyz"
    ports:
      # Host-side journal access. The /journal endpoint serves the
      # JSON-encoded list of received POSTs and is what the e2e/demo
      # test polls to confirm deliveries arrived.
      - "9090:9090"
    restart: unless-stopped

  # demo-publisher — one-shot HL7 v2 publisher. Walks the bundled
  # scenarios/labs.yaml against the bridge's MLLP listener, exits.
  # Lives behind a `demo` profile so `compose up -d` does not run it;
  # invoke via `docker compose run --rm demo-publisher` (or
  # `docker compose --profile demo up demo-publisher`).
  demo-publisher:
    image: fhir-subs:demo
    container_name: fhir-subs-demo-publisher
    depends_on:
      bridge:
        condition: service_started
      demo-subscriber:
        condition: service_started
    entrypoint: ["/demo-publisher"]
    command:
      - "--addr"
      - "bridge:2575"
      - "--catalog"
      - "/etc/fhir-subs/scenarios/labs.yaml"
      - "--pretty=false"
    volumes:
      # The runtime image is distroless (no scenarios on disk); mount
      # the catalog from the repo so a contributor can hand-edit
      # scenarios/labs.yaml without rebuilding.
      - ./scenarios:/etc/fhir-subs/scenarios:ro
    profiles: ["demo"]
    # Auto-injected when invoked via `compose run`; exits on its own.
    restart: "no"

volumes:
  pgdata:
