# demo/config.yaml
#
# Demo-only fhir-subs config consumed by demo/docker-compose.yml.
#
# This file is NOT a production template. It runs the bridge in plaintext
# HTTP, with a pinned in-tree AES-GCM codec key, and with auth disabled
# (no audience configured -> no verifier mounted -> no-op auth middleware
# per cmd/fhir-subs/wiring.go:201-208). Demo gaps 1, 2, and 7 in
# docs/subscription-sidecar-demo.md call out the auth/TLS shortcuts.

deployment:
  facility_id: demo-hospital
  environment: demo
  log_level: info
  log_format: text

adapter:
  # OP #154: the demo adapter (adapters/demo/demo.go) is a tiny
  # illustrative HL7-to-FHIR translator that produces a FHIR
  # Observation from a minimal ORU^R01 message. The `lab-results`
  # topic gates on resource=Observation; selecting the bundled
  # `default` passthrough adapter — as the demo did before this
  # change — produced a Bundle that never matched, so the walkthrough
  # delivered zero notifications.
  id: demo

auth:
  # OP #154: the demo subscriber lives on a private docker-compose
  # network and advertises an http:// URL. Three things have to be
  # true for the bridge to accept the rest-hook subscription:
  #
  #   1. AllowInsecure (allow_insecure_jwks) flips the URL validator's
  #      AllowHTTP to true so http:// schemes pass at create time.
  #   2. allow_subscriber_hosts whitelists the hostname so the
  #      private-IP / loopback SSRF policy is bypassed for that host.
  #   3. allow_dev_bypass installs the no-op principal middleware so
  #      the bridge accepts unauthenticated POST /Subscription
  #      (no audience -> no verifier -> story #117 made the bypass
  #      an explicit opt-in).
  #
  # Security implications: setting allow_insecure_jwks=true allows
  # JWKS over http and bypasses TLS verification on JWKS fetch. It is
  # SAFE for the demo because the demo runs entirely on a single host
  # (compose-internal network) with no real client identities. It is
  # NEVER safe in production. allow_subscriber_hosts trusts internal
  # hostnames; production deployments MUST leave it empty unless they
  # have an explicit reason to trust an internal hostname. See
  # demo/README-compose.md for the security model.
  allow_insecure_jwks: true
  allow_subscriber_hosts:
    - demo-subscriber
  allow_dev_bypass: true

server:
  http:
    bind: "0.0.0.0:8443"
    insecure: true   # plaintext HTTP — demo only

lifecycle:
  shutdown_grace_period: "10s"

database:
  # The hostname `postgres` resolves to the postgres compose service.
  # sslmode=disable because the demo Postgres has no TLS configured.
  url: "postgres://fhirsubs:fhirsubs@postgres:5432/fhirsubs?sslmode=disable"

codec:
  # AES-GCM at-rest encryption for sensitive columns. The key below is a
  # demo-only 32-byte secret (base64). Rotating it for production is a
  # day-one operator task — see docs/low-level-design/storage.md.
  active_key_version: 1
  keys:
    - version: 1
      material: "bocf8udvaKT84Mk5/fLU1NHoy4wf/OWbp2t7gpUm/as="

mllp:
  listeners:
    - name: demo-feed
      bind: "0.0.0.0:2575"
      tls: false

topics:
  # The compose file mounts ./topics (the SubscriptionTopic JSON seeded
  # by Demo gap-6, OpenProject #83) into this path. New files are picked
  # up on startup and on SIGHUP (B-35).
  catalog_dir: "/etc/fhir-subs/topics"
