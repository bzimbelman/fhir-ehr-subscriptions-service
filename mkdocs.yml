site_name: fhir-ehr-subscriptions-service
site_description: A FHIR Subscriptions <-> EHR bridge. Free and open source.
site_url: https://bzimbelman.github.io/fhir-ehr-subscriptions-service/
repo_url: https://github.com/bzimbelman/fhir-ehr-subscriptions-service
repo_name: bzimbelman/fhir-ehr-subscriptions-service
edit_uri: edit/main/docs/

docs_dir: docs

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.action.view
    - content.tabs.link
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - pymdownx.caret
  - pymdownx.keys

plugins:
  - search

nav:
  - Home: index.md
  - Concept: high-level-concept.md
  - Architecture: architecture.md
  - Status: status.md
  - High-Level Design:
      - Overview: high-level-design/README.md
      - Domain Overview: high-level-design/overview.md
      - Domains:
          - Subscriptions API: high-level-design/domains/subscriptions-api.md
          - Subscriptions Engine: high-level-design/domains/subscriptions-engine.md
          - Topic Matcher: high-level-design/domains/topic-matcher.md
          - Topics: high-level-design/domains/topics.md
          - Channels: high-level-design/domains/channels.md
          - MLLP Listener: high-level-design/domains/mllp-listener.md
          - EHR Adapter: high-level-design/domains/ehr-adapter.md
          - Storage: high-level-design/domains/storage.md
          - Lifecycle: high-level-design/domains/lifecycle.md
          - Configuration: high-level-design/domains/configuration.md
          - Observability: high-level-design/domains/observability.md
      - Contracts:
