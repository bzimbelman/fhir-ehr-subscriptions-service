          - 0007 — Spec-bounded scope: high-level-design/decisions/0007-spec-bounded-scope.md
          - 0008 — Resolved design questions: high-level-design/decisions/0008-resolved-design-questions.md
          - 0009 — Language choice: high-level-design/decisions/0009-language-choice.md
          - 0010 — Implementation defaults: high-level-design/decisions/0010-implementation-defaults.md
